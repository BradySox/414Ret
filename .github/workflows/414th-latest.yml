name: 414th Latest Build

# Publishes a rolling "latest" pre-release on every push to main so squadron
# members always have a direct download link without needing a GitHub login or
# digging through the Actions tab.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: [lint, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          # Enough history for the rolling changelog in the release notes (the
          # default shallow checkout only has the tip commit).
          fetch-depth: 50

      - name: Set up Python environment
        uses: ./.github/actions/setup-liberation-python

      - name: Set up JS environment
        uses: ./.github/actions/setup-liberation-js

      - name: Stamp build number and SHA
        run: |
          [IO.File]::WriteAllLines($pwd.path + "\resources\buildnumber", $env:GITHUB_RUN_NUMBER)
          [IO.File]::WriteAllLines($pwd.path + "\resources\gitsha", $env:GITHUB_SHA)

      - name: Build app
        uses: ./.github/actions/build-app

      - name: Create zip
        run: |
          Compress-Archive -Path .\dist\dcs-retribution\ -DestinationPath dist\414th-retribution-latest.zip -Compression Optimal

      # Build the release notes fresh each push so the "Recent changes" list rolls
      # forward with main. Written to a file and passed via body_path (avoids
      # PowerShell here-string backtick/escape headaches with markdown).
      - name: Generate release notes
        shell: bash
        run: |
          {
            echo "**Automated build** from commit ${GITHUB_SHA} on \`main\`."
            echo ""
            echo "The 414th Joint Fighter Group's fork of DCS Retribution — the turn-based"
            echo "dynamic campaign generator, plus the 414th's recon, electronic-warfare,"
            echo "air-defense, frontline, and assets features layered on top of upstream."
            echo ""
            echo "**Highlights**"
            echo "- **Recon & fog-of-war** — player TARPS photo-recon (F-14) backed by the TARS film/debrief engine; enemy sites stay composition- and threat-ring-fogged until scouted, and post-strike BDA waits on a recon pass. A **Reveal fog of war** toggle in the map layer panel shows the real picture on demand."
            echo "- **New player flight types** — JAMMING (C-130J as an EC-130H/RC-130H EW + ISR platform) and SCAR (strike coordination & reconnaissance against a moving HVT, with an optional SOF capture + CSAR path)."
            echo "- **Air war** — QRA intercept reserve (MOOSE A2A dispatcher), reworked air-defense planning (overlapping/jittered BARCAP waves, forward CAP line, threat-weighted volume), and mobile SAMs auto-hidden from the datalink."
            echo "- **Ground war** — TIC frontline firefights with stance-based movement and ambient fire."
            echo "- **Assets** — CurrentHill Iran pack ([CH] Iran 2020 faction, Shahed-136, IRGCN FAC)."
            echo "- Plus UI transparency (target intel, mission-impact debrief, package context), approximate target-area mode, and assorted crash/robustness fixes."
            echo ""
            echo "**Download** \`414th-retribution-latest.zip\`, extract, and run \`retribution_main.exe\`."
            echo ""
            echo "### Recent changes"
            git log -n 15 --no-merges --pretty=format:'- %s (%h)'
            echo ""
            echo ""
            echo "> Built: ${GITHUB_RUN_NUMBER} — ${GITHUB_SHA}"
          } > release_body.md

      - name: Update latest pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "414th Latest Build"
          prerelease: true
          body_path: release_body.md
          files: dist/414th-retribution-latest.zip
