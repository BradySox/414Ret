name: Release Pipeline

on:
  push:
    tags: ["*"]

permissions:
  contents: write

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    uses: ./.github/workflows/test.yml

  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python environment
        uses: ./.github/actions/setup-liberation-python

      - name: Set up JS environment
        uses: ./.github/actions/setup-liberation-js

      - name: Finalize build
        run: |
          New-Item -ItemType file resources\final

      - name: Build app
        uses: ./.github/actions/build-app
        with:
          release: true

      - uses: actions/upload-artifact@v4
        with:
          name: dcs-retribution
          path: dist/

  release:
    needs: [build]
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dcs-retribution

      - name: "Get Version"
        id: version
        env:
          TAG_NAME: ${{ github.ref }}
        run: |
          Get-ChildItem -Recurse -Depth 1
          $version = ($env:TAG_NAME -split "/") | Select-Object -Last 1
          $prerelease = ($version -match '[^\.\d]').ToString().ToLower()
          Write-Host $version
          Write-Host $prerelease
          Write-Output "number=$version" >> $env:GITHUB_OUTPUT
          Write-Output "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          $changelog = Get-Content .\changelog.md
          $last_change = ($changelog | Select-String -Pattern "^#\s" | Select-Object -Skip 1 -First 1).LineNumber - 2
          ($changelog | Select-Object -First $last_change) -join "`n" | Out-File .\releasenotes.md
          Compress-Archive -Path .\dcs-retribution -DestinationPath "dcs-retribution.$version.zip" -Compression Optimal

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: ${{ steps.version.outputs.number }}
          body_path: releasenotes.md
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: dcs-retribution.${{ steps.version.outputs.number }}.zip
