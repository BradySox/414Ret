name: Tests
on: workflow_call
jobs:
  python-tests:
    name: Python tests
    runs-on: windows-latest
    # id-token lets the Codecov upload authenticate via OIDC (no CODECOV_TOKEN
    # secret). The calling workflow's job must grant the same permissions.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python environment
        uses: ./.github/actions/setup-liberation-python

      - name: run tests
        run: |
          ./venv/scripts/activate
          pytest --cov --cov-report=xml tests game/missiongenerator/tests game/missiongenerator/kneeboard_recon/tests game/plugins/tests

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./coverage.xml
          disable_search: true

  ts-tests:
    name: Typescript tests
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JS environment
        uses: ./.github/actions/setup-liberation-js

      - name: run tests
        run: |
          cd client
          npm test -- --coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./client/coverage/lcov.info
          disable_search: true
