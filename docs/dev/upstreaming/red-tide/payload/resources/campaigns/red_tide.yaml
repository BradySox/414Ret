---
name: Germany - Red Tide
theater: GermanyCW
authors: Starfire, 414th JFG
recommended_player_faction: Blufor Late Cold War (80s)
recommended_enemy_faction: Russia 1988
description:
  <p>The storm broke before dawn on 13 July 1988. Soviet and Warsaw Pact armies tore across the inner
  German border and drove for the Rhine, and in the first shock Hamburg fell and the red banner went up
  over Copenhagen. For a few desperate days it looked as though nothing could stop them.</p>
  <p>Then the offensive ran dry. Outrunning its own fuel and ground down by NATO airpower, the Soviet
  spearhead has culminated -- overextended, exposed, and not yet dug in. The line has held, and now the
  initiative changes hands. NATO is going over to the attack -- American Eagles, Tomcats and Phantoms
  wing-to-wing with the Luftwaffe's own JG 74 'Moelders' -- clawing
  back the skies over Central Europe and opening the road to retake Hamburg, liberate Copenhagen, and drive
  the Red Army back east.</p>
  <p>It will not be easy. The enemy is still many, his SAM belts -- S-300 and SA-11 among them -- still
  reach deep, and every kilometer east is paid for. But he is reeling and out of position. Press the
  advantage, break him before he can consolidate, and do not let him set his feet.</p>
  <p><em>A red storm is rising over Central Europe -- the war the Cold War never had. Inspired by the
  pages of Tom Clancy's Red Storm Rising.</em></p>
  <p><strong>Note:</strong> This campaign is intended to be played with the Heatblur F-4E Phantom II
  module active.</p>
miz: red_tide.miz
performance: 2
# Advanced (networked) IADS: red SAM bases carry co-located Command Center + Comms tower M
# + GeneratorF statics (in the .miz). With no iads_config, Skynet wires each base's SAMs to
# its nearby comms (<15nm) / power (<35nm) / command center by range -> destroyable per-base
# C2 cells. (Procedurally-spawned red SAMs have random names, so Falcon-style by-name
# iads_config can't be used here; range mode is the correct fit.)
advanced_iads: true
recommended_start_date: 1988-07-13
# Blue-offensive tuning: NATO out-produces and out-buys the culminated Soviet salient.
recommended_player_money: 800
recommended_enemy_money: 400
recommended_player_income_multiplier: 1.3
recommended_enemy_income_multiplier: 0.7
version: "10.8"
# Supply routes / front geometry and the Baltic shipping lane live in the
# .miz as blue M-113 front-line path groups and a HandyWind lane group.
settings:
  squadron_start_full: true
  # Human-led offensive: keep the blue auto-planner cautious so the AI fills fewer of
  # the ATO's offensive slots and the human's 414th sorties (F-16CM/F-A-18C/F-15E/
  # F-14B/A-10C/F-4E) carry the push. Recommended NEW-GAME defaults; the player can
  # still change them in the wizard.
  #
  # Fraction of OPFOR threat-radius the blue auto-planner ignores. Default 20; lowered
  # so blue AI won't auto-throw strike/SEAD packages deep into red's IADS belt -- the
  # human flies those dangerous sorties instead. (Red/OPFOR aggressiveness untouched.)
  ownfor_autoplanner_aggressiveness: 10
  # Aircraft an airfield must hold before blue auto-plans an OCA strike on it. Default
  # 20; raised so airfield attack becomes a human-chosen objective, not AI busywork
  # (red squadrons are 4-8 jets, so most fields now fall below this threshold).
  oca_target_autoplanner_min_aircraft_count: 40
