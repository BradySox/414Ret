        - primary: CAS
          secondary: air-to-ground
          aircraft:
            - Mi-8MTV2 Hip
          size: 2
        - primary: Air Assault
          secondary: any
          aircraft:
            - Mi-8MTV2 Hip
          size: 2

    # "Chinese border" fields (Tbilisi-Lochini): the sanctuary the ROE never releases.
    Tbilisi-Lochini:
