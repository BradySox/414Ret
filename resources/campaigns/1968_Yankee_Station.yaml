          size: 4
        - primary: Strike
          aircraft:
            - 43d Strategic Wing #B-52H Stratofortress (ex-Guam Arc Light cell)
          size: 4

    # Takhli / Korat RTAFB (Mineralnye Vody): the Thud run into RP VI from the NW. Keeps the
    # 8-jet strike squadron the Alpha Strike fan needs.
    Mineralnye Vody:
        - primary: Strike
          secondary: air-to-ground
          aircraft:
            - F-100D Super Sabre
          size: 8
        - primary: Escort
          secondary: air-to-air
          aircraft:
            - F-4E-45MC Phantom II
          size: 4
        - primary: BAI
          secondary: air-to-ground
          aircraft:
            - F-100D Super Sabre
          size: 4
        - primary: Refueling
          # Rehomed from the dropped Guam off-map spawn -- organic gas for the Takhli
          # Thud strike run.
          aircraft:
            - KC-135 Stratotanker
          size: 2

    # --- North Vietnam (GCI-ambush air arm: ~26 MiGs, defensive MiGCAP only) ---

    # Hanoi (Kutaisi): the MiG hub inside the SA-2 ring
    Kutaisi:
        - primary: BARCAP
          aircraft:
            - MiG-21bis Fishbed-N
          size: 6
        - primary: BARCAP
          aircraft:
            - MiG-17F Fresco-C
          size: 6
        - primary: Transport
          aircraft:
            - Mi-8MTV2 Hip
          size: 2

    # Haiphong (Senaki-Kolkhi): the delta port. The MiG-17Fs are DEFENSIVE (MiGCAP) --
    # Hanoi flew a pure GCI-ambush war (VIETNAM_AIR_DEFENSE_DOCTRINE); a BAI/air-to-ground
