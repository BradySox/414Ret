    # Trail FOBs (Laotian panhandle)
    FOB Tchepone:
        - primary: CAS
          secondary: air-to-ground
          aircraft:
            - Mi-8MTV2 Hip
          size: 2
        - primary: Transport
          secondary: any
          aircraft:
            - Mi-8MTV2 Hip
          size: 2

    FOB Mu Gia:
        - primary: Transport
          secondary: any
          aircraft:
            - Mi-8MTV2 Hip
          size: 2

