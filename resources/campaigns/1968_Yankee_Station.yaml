# Order of battle (2026-07-03 balance pass -- trimmed to ~116 BLUE / ~40 RED, a ~3:1 ratio).
# The theater split mirrors 1968: the Navy owns the coastal route packages from Yankee Station,
# the Air Force crosses the ridge from the Thailand fields, and the in-country wing at Da Nang
# works the DMZ. No SEAD squadrons -- the Vietnam doctrine drops SEAD from the tasking whitelist
# (Iron Hand rides the strike packages), so a SEAD primary would never fly. Sizes are roughly
# halved from the original consolidated OOB: blue keeps every base's identity + feature coverage
# (the Arc Light B-52 cells, one 8-jet Alpha Strike squadron, both carrier wings, TARPS, the
# Super Gaggle + Combat SAR helos) without the turkey-shoot mass; red keeps a credible GCI-ambush
# MiG force (~26) plus a light trail/front helo presence. Every base now fits its parking so
# squadron_start_full fields the whole wing.
squadrons:
    # US NAVY -- CV-61 Ranger (Yankee Station): the BARCAP + interdiction + recon deck
    Naval-1:
        - primary: AEW&C
          aircraft:
            - VAW-122 #Steeljaws - E-2 Hawkeye
          size: 2
        - primary: Refueling
          aircraft:
            - VS-28 (Tanker) #Gamblers - S-3B Viking
          size: 2
        - primary: BARCAP
          secondary: air-to-air
          aircraft:
            - F-8E Crusader
          size: 6
        - primary: BAI
          # Steel Tiger tilt: Ranger's Skyhawks fly armed recon / BAI on the trail convoys;
          # Forrestal (Naval-2) carries the A-6E strike arm.
          secondary: air-to-ground
          aircraft:
            - A-4E Skyhawk
          size: 4
        - primary: TARPS
          # Unarmed photo bird, TARPS only -- no secondary (the old air-to-ground
          # alias is what put recon birds on Armed Recon/Strike, G19).
          aircraft:
            - RA-5C Vigilante
          size: 2

    # US NAVY -- CV-59 Forrestal (Yankee Station): the strike deck
    Naval-2:
        - primary: AEW&C
          aircraft:
            - VAW-123 #Screwtops - E-2 Hawkeye
          size: 2
        - primary: Refueling
          aircraft:
            - VS-24 (Tanker) #Scouts - S-3B Viking
          size: 2
        - primary: BARCAP
          secondary: air-to-air
          aircraft:
            - F-8E Crusader
          size: 4
        - primary: Strike
          secondary: air-to-ground
          aircraft:
            - A-6E Intruder
          size: 6
        - primary: BAI
          secondary: air-to-ground
          aircraft:
            - A-6E Intruder
          size: 4
        - primary: CAS
          secondary: air-to-ground
          aircraft:
            - A-4E Skyhawk
          size: 4

    # Da Nang (Sochi-Adler): the in-country wing on the DMZ
    Sochi-Adler:
        - primary: BARCAP
          secondary: air-to-air
          aircraft:
            - F-4E-45MC Phantom II
          size: 6
        - primary: CAS
          secondary: air-to-ground
          aircraft:
            - A-1H Skyraider
          size: 4
        - primary: BAI
          # Steel Tiger tilt: Skyraiders working the trail by day, alongside the CAS arm
          # holding the DMZ.
          secondary: air-to-ground
          aircraft:
            - A-1H Skyraider
          size: 4
        - primary: CAS
          secondary: air-to-ground
          aircraft:
            - OV-10A Bronco
          size: 4
        - primary: TARPS
          # Unarmed photo bird, TARPS only -- no secondary (see RA-5C note).
          aircraft:
            - RF-101B Voodoo
          size: 2
        - primary: Transport
          # The Combat SAR "King" C-130 + theater lift fly from the DMZ field.
          secondary: any
          aircraft:
            - C-130J-30
          size: 2
        - primary: Air Assault
          secondary: any
          aircraft:
            - UH-1H Iroquois
          size: 2

    # FOB Khe Sanh: the besieged hill outpost under the DMZ (Super Gaggle destination). Sized
    # to the ~6 helipad spots so start-full fields every squadron (it was over-subscribed 12/6).
    FOB Khe Sanh:
        - primary: CAS
          secondary: air-to-ground
          aircraft:
            - AH-1W SuperCobra
          size: 2
        - primary: Air Assault
          secondary: any
