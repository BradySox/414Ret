---
name: Caucasus - 1968 Yankee Station
era: vietnam
theater: Caucasus
authors: NoGoodNews (coastal-ladder recast + Niagara/Steel Tiger consolidation by the 414th JFG)
description:
    <p><strong>The Gulf of Tonkin, summer 1968.</strong> A fictional recreation of the whole
    in-country air war &mdash; the route packages, the trail, and the siege &mdash; on one map.
    The Kolkheti delta plays the Red River delta &mdash; <strong>Hanoi
    (Kutaisi)</strong> inland up the river behind its SA-2 ring, <strong>Haiphong
    (Senaki)</strong> on the coast &mdash; and the route packages ladder south down the
    panhandle through <strong>Vinh (Sukhumi)</strong> and <strong>Dong Hoi (Gudauta)</strong>
    to the <strong>DMZ at the Psou narrows</strong>, where the single front is held from
    <strong>Da Nang (Sochi-Adler)</strong> and the hill outpost at <strong>FOB Khe
    Sanh</strong>.</p>
    <p>The Navy fights the coastal packages &mdash; two carriers on <strong>Yankee Station</strong>
    stand off the delta with Crusaders, Skyhawks and Intruders. The Air Force crosses the
    mountains from "Thailand" &mdash; <strong>Ubon (Maykop)</strong> and <strong>Takhli
    (Mineralnye Vody)</strong> &mdash; the same over-the-ridge run the Thuds flew, with
    the <strong>Arc Light</strong> B-52 wing out of U-Tapao. MiGs flushed to the
    <strong>Tbilisi "Chinese border" fields</strong> sit in a sanctuary your ROE never
    releases &mdash; exactly like the real one.</p>
    <p><strong>Steel Tiger:</strong> everything the NVA throws at the South moves down a real,
    cuttable <strong>Ho Chi Minh Trail</strong> &mdash; truck convoys run FOB Mu Gia &rarr;
    Ban Karai &rarr; Tchepone to the front, night after night under wall-to-wall AAA, and
    every leg crosses a bridge. Find the column, kill it, and roll the next one back before
    the cargo ever reaches the line.</p>
    <p><strong>Operation Niagara:</strong> at the DMZ the NVA has the line pressed in tight.
    The forward strips draw rocket and mortar fire, the encircled hill outpost at <strong>FOB
    Khe Sanh</strong> lives on round-the-clock tac air, Arc Light, and the <strong>Super
    Gaggle</strong> helicopter resupply. Hold the garrison while the deep war runs north.</p>
    <p><strong>Pump up the volume on "Fortunate Son" and enjoy.</strong></p>

recommended_player_faction: USA 1970 Vietnam War
recommended_enemy_faction: Vietnam 1970
recommended_start_date: 1968-06-13
recommended_player_money: 3000
# Economy (2026-07-03 balance pass). This is a static-front WILL campaign, so income mostly
# funds replacements -- and blue's air-to-ground force is uncontested (red flies no fixed-wing
# strikers by design), so a too-rich blue never feels attrition while it craters Regime Resolve
# via trail/ground kills. Two throttles: blue income trimmed 2.0 -> 1.6 (still generous, but
# sustained max-tempo now has a cost), and the enemy given a real war chest (money 1200 -> 1500,
# income 1.1 -> 1.4) so the Ho Chi Minh Trail keeps flowing under interdiction and Regime Resolve
# doesn't collapse before the Rolling Thunder -> Linebacker II arc develops. Blue's starting
# 3000 is a replacement cushion (the fleet starts full via squadron_start_full).
recommended_enemy_money: 1500
recommended_player_income_multiplier: 1.6
recommended_enemy_income_multiplier: 1.4
miz: 1968_Yankee_Station.miz
performance: 2
version: "10.8"
advanced_iads: true

# Operation Niagara (from Khe Sanh): the DMZ line starts pressed in, not at the route
# midpoint. The front between two opposing CPs sits at strength_pct * route_length from
# the blue CP, so a depleted Da Nang garrison pulls the single Sochi<->Gudauta front in
# toward the wire -- the NVA siege pressure on the forward strips and FOB Khe Sanh.
# vietnam_static_front then clamps the line near this start anchor for the whole war.
# Tune 0..1 -- lower = tighter siege.
control_point_strengths:
  Sochi-Adler: 0.35

settings:
  # Vietnam Ops period mechanics (era pre-seed). Coastal carrier war -> naval gunfire on.
  # Convoy interdiction models the Ho Chi Minh Trail from the Laotian-panhandle FOBs
  # (Mu Gia / Ban Karai / Tchepone); airbase harassment presses the forward strips
  # (FOB Khe Sanh, Da Nang); the Super Gaggle runs resupply into the cut-off FOB.
  vietnam_arc_light: true
  vietnam_flak_gauntlet: true
  vietnam_naval_gunfire: true
  vietnam_convoy_interdiction: true
  vietnam_airbase_harassment: true
  vietnam_super_gaggle: true
  vietnam_fac_marking: true
  vietnam_snake_and_nape: true
  vietnam_political_will: true
  vietnam_static_front: true
  restrict_weapons_by_date: true
  # Compressed theater: tuck AEW&C/tanker orbits close to the front. The 80/70 NM
  # defaults stand off ~150 km on a small map, sprawling support to the map edge;
  # 25/20 NM holds them ~75-90 km back. Per-campaign, so large maps are untouched.
  # Tunable live on the Air Doctrine settings page.
  aewc_threat_buffer_min_distance: 25
  tanker_threat_buffer_min_distance: 20
  # Red flies a GCI-ambush war (VIETNAM_AIR_DEFENSE_DOCTRINE): hold more MiGs on hot alert
  # for reactive scrambles instead of standing forward BARCAP orbits. 4 QRA airframes per
  # BARCAP-capable OPFOR squadron (was the global default of 2). OWNFOR unchanged.
  opfor_default_qra_reserve: 4
  automate_runway_repair: true
  automate_front_line_reinforcements: true
  automate_aircraft_reinforcements: false
  # Big theater OOB (Navy + USAF over-the-ridge wings + the whole NVAF/trail web): stand
  # the squadrons up at full strength on turn 0 instead of trickling them in via purchases.
  # Each squadron fills to min(size, available parking) at its base. Pre-checks the New
  # Game "Squadrons start full" generator option; applies to both coalitions.
  squadron_start_full: true
  no_enemy_navy: false
  desired_player_mission_duration: 60
  external_views_allowed: true
  max_frontline_width: 30

