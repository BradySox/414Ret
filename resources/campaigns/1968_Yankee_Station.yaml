          size: 6
        - primary: Transport
          aircraft:
            - An-26B
          size: 2

    # Vinh (Sukhumi-Babushara): panhandle staging. MiG-17Fs defensive (MiGCAP).
    Sukhumi-Babushara:
        - primary: BARCAP
          secondary: air-to-air
          aircraft:
