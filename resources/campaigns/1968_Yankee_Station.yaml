---
name: Caucasus - 1968 Yankee Station
era: vietnam
theater: Caucasus
authors: NoGoodNews (coastal-ladder recast by the 414th JFG)
description:
    <p><strong>The Gulf of Tonkin, summer 1968.</strong> A fictional recreation of the air war
    over North Vietnam. The Kolkheti delta plays the Red River delta &mdash; <strong>Hanoi
    (Kutaisi)</strong> inland up the river behind its SA-2 ring, <strong>Haiphong
    (Senaki)</strong> on the coast &mdash; and the route packages ladder south down the
    panhandle through <strong>Vinh (Sukhumi)</strong> and <strong>Dong Hoi (Gudauta)</strong>
    to the <strong>DMZ at the Psou narrows</strong>, where the single front is held from
    <strong>Da Nang (Sochi-Adler)</strong> and the hill outpost at <strong>FOB Khe
    Sanh</strong>.</p>
    <p>The Navy fights the coastal packages &mdash; two carriers on <strong>Yankee Station</strong>
    stand off the delta with Crusaders, Skyhawks and Intruders. The Air Force crosses the
    mountains from "Thailand" &mdash; <strong>Ubon (Maykop)</strong> and <strong>Takhli
    (Mineralnye Vody)</strong> &mdash; the same over-the-ridge run the Thuds flew, with
    <strong>Arc Light</strong> cells out of Guam and U-Tapao. Enemy supply flows down a real,
    cuttable <strong>Ho Chi Minh Trail</strong> &mdash; FOB Mu Gia &rarr; Ban Karai &rarr; Tchepone
    feed the front, and every leg crosses a bridge. MiGs flushed to the <strong>Tbilisi
    "Chinese border" fields</strong> sit in a sanctuary your ROE never releases &mdash; exactly
    like the real one.</p>
    <p><strong>Pump up the volume on "Fortunate Son" and enjoy.</strong></p>

