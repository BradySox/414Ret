---
name: Afghanistan - Operation Enduring Resolve (COIN)
theater: Afghanistan
authors: 414th JFG (fork of Starfire's Operation Shattered Dagger)
description: >-
  <p><strong>Helmand and Kandahar, 2006 — the first living counterinsurgency campaign.</strong>
  The insurgency holds a web of strongholds and captured FOBs across the south, and it does not
  fight like an army. Its cells <strong>regenerate</strong>: every insurgent-held stronghold
  quietly refills toward its original strength each turn, fed by hidden <strong>ammo caches</strong>
  and the ratline of trail convoys. Body count alone wins nothing here.</p>
  <p>Find the caches (recon them — then strike them) to collapse a stronghold's regeneration,
  interdict the supply trail, and take the strongholds back with air assaults. And check your
  map before you roll in: <strong>the named towns of Helmand — Sangin, Musa Qala, Kajaki,
  Now Zad, Gereshk, Marjah, Lashkar Gah — sit inside big no-strike positive-control
  valleys</strong>, because the insurgency lives among the people. Much of its cells and caches
  sit inside those valleys; every weapon released there prices collateral into the Coalition's
  mandate, kill by kill. The war
  is decided by the <strong>will meters</strong>: the mandate bleeds from airframes, lost
  bases, strikes into the towns, and plain time; the insurgency's momentum bleeds from its
  caches, its convoys, and its strongholds — almost never from its dead fighters. Break their
  momentum before your mandate runs out.</p>
  <p>You fly with the real 2006 coalition off the <strong>Kandahar ramp</strong>: A-10s,
  Dutch F-16s, RAF Harriers, and the CENTAF heavies — Strike Eagles, B-1s, and the KC-135
  bridge — with Marine Harriers at Bastion and <strong>a real carrier in the Gulf of
  Oman</strong> (Hornets, a Hawkeye, and A-6 buddy tankers running the 800 km cycle north).
  Each squadron flies under its own flag. The enemy answers with guns and shoulder-fired
  SAMs at every stronghold — and <strong>a thin radar-SAM crust at the anchors</strong>:
  an SA-6 battery over Farah, an SA-3 site at Tarinkot, a Kub at the Kandahar gate, with
  SA-8/13/15 in the short-range mix. Enough to make SEAD a real job again; never enough
  to stop the war. Low is still where it hurts most.</p>
  <p>Laydown by Starfire (Operation Shattered Dagger); the COIN layer — cache-throttled cell
  regeneration, the inverted will economy, and the campaign arc — is the 414th's.</p>
recommended_player_faction: OEF Coalition 2006
recommended_enemy_faction: Toyota Al Gaib 2001
miz: coin_enduring_resolve.miz
performance: 1
recommended_start_date: 2006-04-24
# A small real income (the original zeroed it entirely because the stock economy
# bought SAMs): the C1 regen engine is the insurgency's real supply, and the ratline
# needs rear units to move. Kept low so procurement stays a trickle.
recommended_enemy_money: 250
recommended_enemy_income_multiplier: 0.25
version: "10.8"
settings:
  squadron_start_full: true
  # The COIN stack (feature docs: 414th-coin-insurgent-replenishment-notes.md):
  # cache-throttled cell regeneration + the ratline + FOB standoff fire + the
  # will economy that decides the war.
  coin_insurgency: true
  # C1.5: the insurgency retakes cleared-but-ungarrisoned bases over ~4 announced,
  # counterable turns (relocate, never grow) -- clearing a stronghold is not enough,
  # you must HOLD it. A completed flip drains the mandate like any lost base.
  coin_reinfiltration: true
  # Roadside IEDs on the insurgent ratline: hidden, recon-fogged strike targets you
  # must sweep (TARPS + CAS) -- an un-cleared device detonates and drains the mandate
  # (weight below). Sweeping the trail is a real job now.
  coin_ied: true
  # High-value targets: a named insurgent leader surfaces near a stronghold for a
  # limited strike window. Kill him to blow the insurgency's momentum -- but he shelters
  # among his people (the town rings), so a dirty shot pays in mandate too.
  coin_hvt: true
  # Dispersed cells: the insurgency in the open countryside between the strongholds.
  # Patrol for them (TARPS + CAS) or an un-hunted cell coalesces into its home stronghold
  # and brings a destroyed cache back online -- re-opening the regen you shut off.
  coin_dispersed_cells: true
  # Insurgent indirect fire: blue airfields/FARPs/FOBs within mortar reach of a live
  # stronghold draw sporadic in-mission rocket/mortar harassment (never a player-spawn
  # field). Stronghold-proximity based -- unlike the front-based Vietnam §36 toggle
  # below, this works on the front-less air-assault laydown. Silencing a base's fire
  # means pushing its stronghold back.
  coin_harassment: true
  vietnam_convoy_interdiction: true
  # §50 convoy escort/ambush -- the mirror of interdiction: your OWN supply convoys run
  # the Helmand roads and concealed insurgent ambush teams dig in along the route (peak
  # "ambush alley"); fly CAS/BAI escort or the column is ground down. Preseed the
  # convoyambush PLUGIN ON too (the §36 lesson) so a saved default with it off doesn't
  # silently kill the feature.
  convoy_ambush: true
  plugins:
    convoyambush: true
  vietnam_airbase_harassment: true
  vietnam_political_will: true
  # The insurgent faction's ERO ZU-23 technicals/emplacements are §41 HDS
  # Ultimate Compilation content — they resolve only with the mod on (and drop
  # silently without it, so a mod-less install still plays).
  high_digit_sams: true
  # The carrier stands off ~800 km in the Gulf of Oman -- far beyond the stock
  # planner's range gate. Raise the plane range so the carrier air is assignable,
  # and frag a deterministic carrier package (Hornets + A-6 tanker + E-2) each turn.
  max_mission_range_planes: 600
  long_range_carrier_ops: true

# The inverted COIN will economy (design note §4): the insurgency's dead fighters are
# nearly free; its caches, convoys, and strongholds are the currency. The Coalition
# pays for airframes, bases, ROE violations near the towns — and gets no passive
# regen, because time itself drains a mandate.
will:
  blue:
    label: The Coalition's mandate
    exhaustion_title: The Coalition withdraws
    exhaustion_body: >-
      The mandate is spent -- the capitals order the drawdown, and the valleys
      go back to the shadows.
  red:
    label: the insurgency's momentum
    exhaustion_title: The insurgency collapses
    exhaustion_body: >-
      The caches are ash, the ratline is cut, and the fighters melt away --
      the valleys go quiet.
  weights:
    blue_airframe_loss: 2.0
    # 1.0/kill = CDE pressure, not taboo: with rings over every town, a careful
    # town fight is survivable once -- a carpet habit bleeds the mandate out.
    blue_roe_violation: 1.0
    blue_base_lost: 5.0
    # An un-swept IED detonation: a modest, steady mandate bleed -- the political cost
    # of an un-secured road. Below a base loss; above a single airframe.
    blue_ied_detonation: 2.5
    blue_passive_regen: 0.0
    red_ground_unit_lost: 0.05
    red_base_lost: 5.0
    red_cache_lost: 4.0
    # A decapitation: killing a named leader in his window is a real momentum blow --
    # on the order of a stronghold's caches, worth the hunt (and the CDE risk).
    red_hvt_killed: 4.0
    # ...and a leader whose window lapses is a small propaganda coup for the
    # insurgency (2026-07-18 audit call: ignoring the hunt must cost something;
    # the kill stays worth ~2.7x the escape's swing).
    red_hvt_escaped: 1.5
    red_passive_regen: 1.0

# Clear -> Hold -> Build, will-coupled. The positive-control valleys (big box/corridor
# no-strike areas over the populated river valleys) are permanent every phase --
# collateral inside them pays in mandate, never a hard block. No free-fire inversion:
# the open desert and the northern gate are simply unrestricted.
# NOTE: never lock the `ammo` class -- the caches must always be legal targets.
phases:
  - key: disrupt
    name: Disrupt the Network
    narrative: >-
      Map the insurgency before you fight it: find the caches, cut the ratline,
      and open the road out of Kandahar. The strongholds can wait -- their supply
      cannot.
    emphasis: interdiction
    objectives:
      - Recon and destroy ammo caches -- each one killed slows that stronghold's regeneration
      - Interdict the trail convoys -- the ratline feeds the momentum meter
      - Mind the valleys -- fixed strikes inside the positive-control areas bleed the mandate
      - text: Retake FOB Frontenac -- the gate out of Kandahar
        done_when:
          capture_cp: FOB Frontenac
    restricted_zones: &population_centers
      # THE COIN LATTICE (positive-control VALLEYS, not town rings): the populated
      # river valleys where the strongholds and the people are, drawn as big
      # box/corridor no-strike areas -- "the horror of COIN: everything near
      # civilians is under JTAC positive control." A fixed strike inside prices CDE
      # into the mandate (violation weight 1.0: pressure, not taboo); the open
      # desert and the northern gate stay free-strike. Trail convoys / troops in
      # contact are never gated, and air assaults (captures) are never blocked, so
      # the campaign can still retake its objectives. Permanent every phase -- the
      # towns are always populated. Coordinate-anchored to the real terrain.
      #
      # The Helmand "Green Zone": the irrigated belt up the river, Kajaki down to
      # Marjah through Sangin/Gereshk/Lashkar Gah -- the heart of the population.
      - shape: corridor
        name: Helmand Green Zone -- positive control
        width_nm: 22
        path:
          - {x: -181452, y: -106712}  # Kajaki (the dam)
          - {x: -209658, y: -127043}  # Sangin
          - {x: -237656, y: -151564}  # Gereshk
          - {x: -267202, y: -170619}  # Lashkar Gah (provincial capital)
          - {x: -271880, y: -193810}  # Marjah
      # The northern feeder valley (Route 611): Now Zad -- Musa Qala -- Kajaki.
      - shape: corridor
        name: Musa Qala Valley -- positive control
        width_nm: 18
        path:
          - {x: -173272, y: -162286}  # Now Zad
          - {x: -168553, y: -136022}  # Musa Qala
          - {x: -181452, y: -106712}  # Kajaki
      # The Tarin Kowt bowl (Uruzgan) -- the northern population center.
      - shape: box
        name: Tarin Kowt Bowl -- positive control
        x: -146074
        y: -30595
        width_nm: 34
        height_nm: 28
      # The Delaram / Ring-Road junction in the west.
      - shape: box
        name: Delaram -- positive control
        x: -199964
        y: -259516
        width_nm: 30
        height_nm: 26
    advance_when:
      capture_cp: FOB Frontenac
  - key: clear_hold
    name: Clear and Hold
    min_turn: 10
    red_tempo:
      trail_surge: 2.0
    narrative: >-
      Take the strongholds back with air assaults -- and hold them. The network
      answers with a supply surge; a cleared stronghold left alone invites the
      shadows back in.
    emphasis: offensive
    objectives:
      - text: Clear the Helmand ring -- retake Kamp Hadrian
        done_when:
          capture_cp: Kamp Hadrian
      - text: Bleed the momentum below half
        done_when:
          red_resolve_below: 50
      - Hold what you clear -- garrisons and patience beat body count
    restricted_zones: *population_centers
    advance_when:
      red_resolve_below: 45
  - key: build
    name: Break the Momentum
    min_turn: 20
    narrative: >-
      The network is cracking. Keep the caches dead, keep the strongholds held,
      and take the war to Tarinkot -- momentum, once broken, does not come back.
    emphasis: offensive
    objectives:
      - text: Retake Tarinkot -- the insurgency's northern anchor
        done_when:
          capture_cp: Tarinkot
      - text: Break the insurgency's momentum
        done_when:
          red_resolve_below: 25
    restricted_zones: *population_centers

# The ratline: red<->red supply corridors between the strongholds. Waypoints trace
# the REAL driveable corridors (Highway 1, Route 611 up the Helmand valley, the
# Uruzgan road) -- authored via tools/supply_route_geo.py from real road lat/lons,
# the 414th standard for all supply-line drawings. Endpoints are exact stronghold
# XY (closest-CP binding reads first/last waypoint only); red<->red only -- a
# red<->blue route would create a front line, and this stays an air-assault campaign.
supply_routes:
  # Farah -> FOB Delaram II  (Highway 1 / the Ring Road, ESE)
  - waypoints:
      - [-178644, -378451]
      - [-185879, -342516]
      - [-199269, -300150]
      - [-203597, -258944]
  # FOB Delaram II -> ANP Hill (Now Zad)  (NE track skirting the north edge of the Dasht-e Margo)
  - waypoints:
      - [-203597, -258944]
      - [-185651, -220124]
      - [-172032, -187320]
      - [-174184, -162657]
  # ANP Hill (Now Zad) -> FOB Jackson (Sangin)  via Musa Qala -- the 611 wadi
  - waypoints:
      - [-174184, -162657]
      - [-169101, -135636]
      - [-190089, -130581]
      - [-209298, -127205]
  # FOB Jackson (Sangin) -> FOB Zeebrugge (Kajaki)  (Route 611, up the Helmand)
  - waypoints:
      - [-209298, -127205]
      - [-195334, -113519]
      - [-181518, -101421]
  # Tarinkot -> Kamp Hadrian  (the Tarin Kowt bowl, W toward Deh Rawud)
  - waypoints:
      - [-148524, -31352]
      - [-147324, -48689]
      - [-146856, -66510]
  # Kamp Hadrian -> Firebase Cobra  (N up the Uruzgan valley)
  - waypoints:
      - [-146856, -66510]
      - [-129925, -63191]
      - [-111672, -60214]
  # Tarinkot -> FOB Martello  (SE down the Uruzgan-Kandahar road)
  - waypoints:
      - [-148524, -31352]
      - [-165482, -21883]
      - [-179635, -12066]
      - [-189960, -7031]
  # FOB Martello -> FOB Frontenac (the Kandahar gate)  (SW, Uruzgan road descent)
  - waypoints:
      - [-189960, -7031]
      - [-209768, -17825]
      - [-231043, -30347]
  # FOB Geronimo -> FOB Zeebrugge (Kajaki)  the Helmand highway the whole way: Lashkar Gah -> Gereshk -> Sangin -> Kajaki (through the town rings)
  - waypoints:
      - [-285099, -180708]
      - [-263851, -170168]
      - [-238126, -153451]
      - [-208889, -127434]
      - [-181518, -101421]
  # Kandahar Airfield -> Camp Bastion  (the BLUE rear corridor: Highway 1 west through
  # Zhari/Howz-e Madad -> Maiwand -> Gereshk, then the Bastion access road -- THE
  # ambush-alley convoy run; feeds the §50 escort convoys, which no-op without a
  # blue->blue road). Geo-authored via tools/supply_route_geo.py coin.
  - waypoints:
      - [-270486, -29690]
      - [-261488, -71869]
      - [-254647, -106269]
      - [-237771, -151847]
      - [-232270, -171511]
      - [-235178, -184377]

