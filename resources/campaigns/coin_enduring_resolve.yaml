---
name: Afghanistan - Operation Enduring Resolve (COIN)
theater: Afghanistan
authors: 414th JFG (fork of Starfire's Operation Shattered Dagger)
description: >-
  <p><strong>Helmand and Kandahar, 2006 — the first living counterinsurgency campaign.</strong>
  The insurgency holds a web of strongholds and captured FOBs across the south, and it does not
  fight like an army. Its cells <strong>regenerate</strong>: every insurgent-held stronghold
  quietly refills toward its original strength each turn, fed by hidden <strong>ammo caches</strong>
  and the ratline of trail convoys. Body count alone wins nothing here.</p>
  <p>Find the caches (recon them — then strike them) to collapse a stronghold's regeneration,
  interdict the supply trail, and take the strongholds back with air assaults. And check your
  map before you roll in: <strong>the named towns of Helmand — Sangin, Musa Qala, Kajaki,
  Now Zad, Gereshk, Marjah, Lashkar Gah — sit inside big no-strike positive-control
  valleys</strong>, because the insurgency lives among the people. Much of its cells and caches
  sit inside those valleys; every weapon released there prices collateral into the Coalition's
  mandate, kill by kill. The war
  is decided by the <strong>will meters</strong>: the mandate bleeds from airframes, lost
  bases, strikes into the towns, and plain time; the insurgency's momentum bleeds from its
  caches, its convoys, and its strongholds — almost never from its dead fighters. Break their
  momentum before your mandate runs out.</p>
  <p>You fly with the real 2006 coalition off the <strong>Kandahar ramp</strong>: A-10s,
  Dutch F-16s, RAF Harriers, and the CENTAF heavies — Strike Eagles, B-1s, and the KC-135
  bridge — with Marine Harriers at Bastion and <strong>a real carrier in the Gulf of
  Oman</strong> (Hornets, a Hawkeye, and A-6 buddy tankers running the 800 km cycle north).
  Each squadron flies under its own flag. The enemy answers with guns and shoulder-fired
  SAMs at every stronghold — and <strong>a thin radar-SAM crust at the anchors</strong>:
  an SA-6 battery over Farah, an SA-3 site at Tarinkot, a Kub at the Kandahar gate, with
  SA-8/13/15 in the short-range mix. Enough to make SEAD a real job again; never enough
  to stop the war. Low is still where it hurts most.</p>
  <p>Laydown by Starfire (Operation Shattered Dagger); the COIN layer — cache-throttled cell
  regeneration, the inverted will economy, and the campaign arc — is the 414th's.</p>
recommended_player_faction: OEF Coalition 2006
recommended_enemy_faction: Toyota Al Gaib 2001
miz: coin_enduring_resolve.miz
performance: 1
recommended_start_date: 2006-04-24
# A small real income (the original zeroed it entirely because the stock economy
# bought SAMs): the C1 regen engine is the insurgency's real supply, and the ratline
# needs rear units to move. Kept low so procurement stays a trickle.
recommended_enemy_money: 250
recommended_enemy_income_multiplier: 0.25
version: "10.8"
settings:
  squadron_start_full: true
  # The COIN stack (feature docs: 414th-coin-insurgent-replenishment-notes.md):
  # cache-throttled cell regeneration + the ratline + FOB standoff fire + the
  # will economy that decides the war.
  coin_insurgency: true
  # C1.5: the insurgency retakes cleared-but-ungarrisoned bases over ~4 announced,
  # counterable turns (relocate, never grow) -- clearing a stronghold is not enough,
  # you must HOLD it. A completed flip drains the mandate like any lost base.
  coin_reinfiltration: true
  # Roadside IEDs on the insurgent ratline: hidden, recon-fogged strike targets you
  # must sweep (TARPS + CAS) -- an un-cleared device detonates and drains the mandate
  # (weight below). Sweeping the trail is a real job now.
  coin_ied: true
  # High-value targets: a named insurgent leader surfaces near a stronghold for a
  # limited strike window. Kill him to blow the insurgency's momentum -- but he shelters
  # among his people (the town rings), so a dirty shot pays in mandate too.
  coin_hvt: true
  # Dispersed cells: the insurgency in the open countryside between the strongholds.
  # Patrol for them (TARPS + CAS) or an un-hunted cell coalesces into its home stronghold
  # and brings a destroyed cache back online -- re-opening the regen you shut off.
  coin_dispersed_cells: true
  # Insurgent indirect fire: blue airfields/FARPs/FOBs within mortar reach of a live
  # stronghold draw sporadic in-mission rocket/mortar harassment (never a player-spawn
  # field). Stronghold-proximity based -- unlike the front-based Vietnam §36 toggle
  # below, this works on the front-less air-assault laydown. Silencing a base's fire
  # means pushing its stronghold back.
  coin_harassment: true
  vietnam_convoy_interdiction: true
  # §50 convoy escort/ambush -- the mirror of interdiction: your OWN supply convoys run
  # the Helmand roads and concealed insurgent ambush teams dig in along the route (peak
  # "ambush alley"); fly CAS/BAI escort or the column is ground down. Preseed the
  # convoyambush PLUGIN ON too (the §36 lesson) so a saved default with it off doesn't
  # silently kill the feature.
  convoy_ambush: true
  plugins:
    convoyambush: true
  vietnam_airbase_harassment: true
  # The insurgent faction's ERO ZU-23 technicals/emplacements are §41 HDS
  # Ultimate Compilation content — they resolve only with the mod on (and drop
  # silently without it, so a mod-less install still plays).
  high_digit_sams: true
  # The carrier stands off ~800 km in the Gulf of Oman -- far beyond the stock
  # planner's range gate. Raise the plane range so the carrier air is assignable,
  # and frag a deterministic carrier package (Hornets + A-6 tanker + E-2) each turn.
  max_mission_range_planes: 600
  long_range_carrier_ops: true

red_tempo:
  - from_turn: 10
    name: Clear and Hold
    trail_surge: 2.0

