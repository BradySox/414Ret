# the interdiction target set: Highway 1 (Baghdad-Taji-Balad-Samarra-Tikrit-Bayji-
# Qayyarah-Mosul), Highway 10 west to the Habbaniyah front, Highway 6 southeast to
# Kut, the Jabal Hamrin crossing to Kirkuk, and the Kurdish arcs (Altun Kupri,
# Chamchamal, Bartella, Makhmur). BLUE's pipeline-station ladder H-3 -> H-2 ->
# Al-Asad is authored as M-113 path groups in the .miz (they carry the front line up
# the ladder and double as the convoy roads once each rung is captured).
