---
name: Iraq - Umm al-Ma'arik (Desert Storm 1991)
theater: Iraq
authors: Flash, 414th JFG
recommended_player_faction: NATO Desert Storm
recommended_enemy_faction: Iraq 1991
description:
  <p>It was said Baghdad was the most well defended city in the world before Desert
  Storm -- denser than Hanoi at the height of Rolling Thunder. The French-built KARI
  network ties every SA-2, SA-3 and Roland ring back through sector operations centers
  to one air defense operations center in Baghdad, and the Iraqi Air Force sits on
  GCI alert behind it -- the Foxbats of Qadessiya at Al-Asad closest of all.</p>
  <p>Tonight that claim gets tested. In the war's opening hours the coalition seized
  the three H-3 desert strips on the western border; the tanker bridge and the AWACS
  orbits run from the Saudi rear behind them. Strike east up the old pipeline road --
  put out KARI's eyes, collapse the SAM rings, hunt the Scud launchers in the western
  baskets, and climb the ladder -- H-2, then Qadessiya, then the Habbaniyah line --
  until the ground offensive can end it at Baghdad's gates. Saddam has promised his people
  <em>Umm al-Ma'arik</em> -- the Mother of all Battles. Give it to him.</p>
miz: iraq_desert_storm.miz
performance: 2
# Advanced (networked) IADS -- the KARI network: red SAM hubs carry co-located Command
# Center + Comms tower M + GeneratorF statics (in the .miz; the ADOC at Baghdad, sector
# operations centers at Al-Taquddum / Kirkuk / Al-Kut, comms/power relays at every
# other red base incl. Qadessiya/H-2/Balad/Mosul) plus a P-37/1L13 EWR chain with a
# forward station at Qadessiya facing the H-3 front. With no iads_config, MANTIS wires
# each base's SAMs to its nearby comms (<15nm) / power (<35nm) / command center by
# range -> destroyable per-base C2 cells, the Red Tide pattern. Decapitating the C2
# (the F-117's war) degrades the whole net -- and feeds the s52 preseed below.
advanced_iads: true
# The air campaign opened at 0300 local on 17 January 1991. The datetime form seeds
# the clock too, so a new campaign starts on the night-one strikes.
recommended_start_date: 1991-01-17T03:00:00
# Sanctioned, blockaded Iraq: a big standing army, thin replacements. The coalition
# out-buys it from turn one.
recommended_player_money: 2000
recommended_enemy_money: 1000
recommended_enemy_income_multiplier: 0.5
version: "10.8"
settings:
  squadron_start_full: true
  # 1991 era enforcement: no AMRAAM-era stores or 2000s cueing visors on the
  # modern-block airframes (both halves of the date gate, per the settings-split
  # lesson -- the A-10C and F-16CM fly here with era loadouts).
  restrict_weapons_by_date: true
  restrict_props_by_date: true
  # The Iraqi Air Force fought as a GCI-vectored alert force under KARI: more MiGs
  # on reactive hot-alert, fewer standing forward orbits.
  opfor_default_qra_reserve: 4
  # The authored Instant Thunder -> Scud Hunt -> ground-offensive arc below.
  campaign_phases: true
  # The will economy carries the political layer: coalition cohesion vs the regime's
  # resolve, the POW running sore (paraded aircrew drain cohesion every turn until
  # freed -- a negotiated win brings them home), and the CDE price of a release
  # inside the Baghdad no-strike circle (the Al-Firdos lesson).
  vietnam_political_will: true
  # KARI's C2 is real and destroyable here, so its loss is felt in red's planning
  # quality (s52) -- and KARI historically repaired and relocated between strikes,
  # so red's AI may rebuild dead SAM sites (s68).
  c2_decapitation_effects: true
  auto_repair_air_defenses: true
  # Blue-side COMINT (s70): read the KARI net for the ambient take, put a collector
  # over the fence for the tasking leak, and hunt the transmitting nodes on the DF
  # gear. Bomb-it-or-tap-it.
  comint_collection: true
  red_comms_net: true
  # s50: real supply convoys run the highway graph below; the pipeline-road ladder
  # legs live in the .miz and light up as blue captures the rungs.
  convoy_ambush: true
  # s61 host tools for the DM (gated to the host's tag via the plugin option below).
  host_red_scramble: true
  # Plugin preseeds (the s36 saved-default-off lesson): a plugin unticked in the
  # host's saved defaults would otherwise silently kill its preseeded feature.
  plugins:
    convoyambush: true
    # s49 shoot-and-scoot for the authored Scud batteries (incl. the two western
    # baskets on the H-3 front) -- the Great Scud Hunt needs the launchers to never
    # be where the last recon photo froze them.
    mobilemissiles: true
    # s70 C1: the audible KARI UHF net (CW traffic from every alive C2 node).
    rednet: true
    redscramble: true
    redscramble.hostPlayers: Flash

# The Desert Storm political layer: the war is won by breaking the regime's resolve
# (Umm al-Ma'arik ends at the table in Safwan), and lost only if the coalition itself
# fractures -- Scud terror, paraded POWs and a CDE catastrophe are Baghdad's only real
# weapons against it. Feed weights stay at the Vietnam-derived defaults except the ROE
# violation, priced up: one Al-Firdos is survivable, a habit is not.
will:
  blue:
    label: Coalition cohesion
    exhaustion_title: The coalition fractures
    exhaustion_body: >-
      Scud terror, paraded aircrew and bombed shelters have done what the Iraqi army
      could not -- the partners waver, the capitals lose their stomach, and the
      coalition stands down with Saddam still in his palace.
  red:
    label: the regime's resolve
    exhaustion_title: Baghdad capitulates
    exhaustion_body: >-
      The army is wrecked on the roads, KARI is blind, and the Mother of all Battles
      is lost -- Baghdad accepts every coalition term at Safwan.
  weights:
    blue_roe_violation: 3.0

# The authored three-phase arc. Baghdad's populated river-bend core sits inside a
# permanent no-strike circle (both airbase MEZs stay legal targets outside it); a
# release inside it prices CDE into coalition cohesion at the weight above -- never
# a hard block, always a bill.
phases:
  - key: instant_thunder
    name: Instant Thunder
    narrative: >-
      Night one, and every night after: put out KARI's eyes. The ADOC in Baghdad and
      the sector operations centers at Al-Taquddum, Kirkuk and Al-Kut are the
      network's brain; the EWR chain is its eyes; the SA-2 and SA-3 rings around
      Baghdad are its teeth. Decapitate the C2, roll back the belt, and win the air
      war the Foxbats of Qadessiya come up to fight.
    emphasis: rollback
    objectives:
      - Decapitate KARI -- the ADOC and sector operations centers are strikeable C2
      - Roll back the Baghdad SAM rings -- SEAD opens the corridors everything uses
      - Kill the EWR chain and the net goes quiet on the DF gear too
    restricted_zones: &baghdad_cde
      - shape: circle
        name: Baghdad -- populated city (no strike)
        x: 9000
        y: 16000
        radius_nm: 4
    advance_when:
      enemy_iads_below: 0.55
  - key: scud_hunt
    name: The Great Scud Hunt
    min_turn: 4
    red_tempo:
      trail_surge: 1.5
    narrative: >-
      The Scuds are flying, and every launch is aimed at the coalition itself. The
      western baskets sit right on your doorstep -- find the launchers before they
      shoot, they relocate between every recon pass -- and strangle the highway net
      that feeds them and the army. Take H-2 to open the pipeline road; Baghdad
      surges its convoys to compensate. Good. More targets.
    emphasis: interdiction
    objectives:
      - Hunt the Scud batteries -- TARPS the suspected sites, then kill the launchers
      - Interdict the highway convoys -- the army lives on the roads
      - text: Seize H-2 -- the first rung of the ladder
        done_when:
          capture_cp: H-2 Airbase
      - Keep the pressure on KARI -- the rings repair themselves if you let them
    restricted_zones: *baghdad_cde
    advance_when:
      enemy_iads_below: 0.35
  - key: umm_al_maarik
    name: Umm al-Ma'arik -- the ground offensive
    min_turn: 9
    narrative: >-
      The air war is won; now end the whole thing. Take Qadessiya -- Al-Asad, the
      Foxbats' own fortress -- break the army in the field before it can dig in
      around the capital, and force the regime to the table. The Mother of all
      Battles ends at Safwan, one way or the other.
    emphasis: offensive
    objectives:
      - text: Take Al-Asad -- Qadessiya, the western fortress
        done_when:
          capture_cp: Al-Asad Airbase
      - text: Break the regime's resolve
        done_when:
          red_resolve_below: 25
      - Mind the city -- the no-strike circle holds to the end
    restricted_zones: *baghdad_cde

# The 1991 highway graph, traced from the real road network per the driveable-corridor
# standard (tools/supply_route_geo.py, mode `iraq_desert_storm` -- regenerate there,
