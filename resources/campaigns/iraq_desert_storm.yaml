squadrons:
  # Historical identities: every squadron below is named for the real unit that flew
  # (or best matches) its airframe and role in January 1991, per the published
  # orbats (Gulf War Air Power Survey, ACIG/Osprey IrAF orders of battle). Where the
  # DCS airframe stands in for the real one, the comment says so. Liveries are
  # deliberately NOT authored (they must match the installed DCS livery set; see the
  # squadron-livery-audit note) -- identity only. female_pilot_percentage is 0
  # everywhere: US combat squadrons were closed to women until 1993.
  # ---- BLUE: the off-map Saudi rear -- the tanker bridge and the AWACS orbits.
  # The Iraq map has no 60x60 heavy stands west of Baghdad, and historically the
  # big wings never based in Iraq at all: they fly from over the border.
  Coalition Rear (Saudi Arabia):
    # The 552nd's deployed E-3 squadron over the southern radar picket.
    - primary: AEW&C
      name: 963rd AWACS
      nickname: Blue Knights
      female_pilot_percentage: 0
      aircraft:
        - E-3A
      size: 1
    # The provisional tanker wings that ran the air bridge.
    - primary: Refueling
      name: 1701st AREFW (Provisional)
      nickname: ""
      female_pilot_percentage: 0
      aircraft:
        - KC-135 Stratotanker
      size: 1
    - primary: Refueling
      name: 1702nd AREFW (Provisional)
      nickname: ""
      female_pilot_percentage: 0
      aircraft:
        - KC-135 Stratotanker MPRS
      size: 1
    # The coalition allies fly from the rear too, exactly where they really were
    # (RAF Dhahran/Muharraq, French Al Ahsa). Both reference nation-countried
    # squadron presets, so the s23 layer gives them their own comms identity and
    # national pilot names. The RAF flies the war's famous low-level runway
    # attacks; Daguet's Mirage 2000s stand DCA over the rear.
    - primary: OCA/Runway
      secondary: [Strike, BAI]
      name: No. 31 Squadron
      nickname: Goldstars
      female_pilot_percentage: 0
      aircraft:
        - No. 31 Squadron
      size: 8
    - primary: BARCAP
      secondary: air-to-air
      name: Escadron de chasse 2/5
      nickname: Île-de-France
      female_pilot_percentage: 0
      aircraft:
        - Escadron de chasse 2/5
      size: 8
    # Daguet's other jet: the ER 33 Mirage F1CR recon det (the F1CT stands in --
    # it kept the CR's camera nose). Primary TARPS: the French fly the photo-recon
    # war over KARI. Period detail baked into the laydown: the coalition grounded
    # these very jets for the first week because they were dead ringers for Iraq's
    # F1EQs -- which this campaign fields at Qayyarah. Check before you shoot.
    - primary: TARPS
      secondary: [BAI]
      name: ER 1/33 Belfort
      nickname: Belfort
      female_pilot_percentage: 0
      aircraft:
        - Escadron de Chasse 3/33 Lorraine
      size: 8
  # ---- BLUE: H-3 Main -- the fighter/strike wing + the Bombcats ----
  16:
    # The F-15C wall: BARCAP primary so blue stands defensive orbits; the
    # air-to-air secondary feeds every escort the strike packages need. The 58th
    # scored 16 kills -- the most of any squadron in the war.
    - primary: BARCAP
      secondary: air-to-air
      name: 58th TFS
      nickname: Gorillas
      female_pilot_percentage: 0
      aircraft:
        - F-15C Eagle
      size: 12
    # The Wild Weasels (the F-4E stands in for the real 561st's F-4G).
    - primary: SEAD Sweep
      secondary: air-to-ground
      name: 561st TFS
      nickname: Black Knights
      female_pilot_percentage: 0
      aircraft:
        - F-4E-45MC Phantom II
      size: 12
    # Strike primary keeps the Bombcat flyable; the secondary is air-to-AIR, not
    # air-to-ground -- the A2G alias includes DEAD/SEAD, and with KARI's 95 SAM
    # sites the planner was fragging Tomcats at SA-2 rings (the airframe data even
    # carries DEAD: 390). Real DS Tomcats flew escort/CAP/TARPS; now so do these.
    # VF-103 flew the F-14A+ (redesignated F-14B) from Saratoga in the real war.
    - primary: Strike
      secondary: air-to-air
      name: VF-103
      nickname: Sluggers
      female_pilot_percentage: 0
      aircraft:
        - F-14B Tomcat
      size: 8
  # ---- BLUE: H-3 Northwest -- the SEAD/precision/attack strip. The A-10 flies
  # from here, not the Southwest strip: the Hog's 17.5 m span outsizes all but two
  # of SW's stands (the parking-fit test guards this). ----
  18:
    # The 52nd TFW's Weasel Vipers -- they flew the hunter-killer teams with the
    # F-4Gs (the Block 50 stands in for their Block 25s).
    - primary: DEAD
      secondary: any
      name: 23rd TFS
      nickname: Fighting Hawks
      female_pilot_percentage: 0
      aircraft:
        - F-16CM Fighting Falcon (Block 50)
      size: 8
    # Saratoga's HARM shooters -- and the Hornets that killed two MiG-21s
    # mid-strike on day one without dropping their bombs.
    - primary: SEAD
      secondary: any
      name: VFA-81
      nickname: Sunliners
      female_pilot_percentage: 0
      aircraft:
        - F/A-18C Hornet (Lot 20)
      size: 8
    # The 4th TFW's Strike Eagles -- the Scud hunters of the western desert.
    - primary: OCA/Runway
      secondary: any
      name: 336th TFS
      nickname: Rocketeers
      female_pilot_percentage: 0
      aircraft:
        - F-15E Strike Eagle (Suite 4+)
      size: 8
    # The Myrtle Beach Hogs out of King Fahd (the A-10C stands in for the A-10A;
    # the 1991 date-gates keep its stores era-honest).
    - primary: CAS
      secondary: air-to-ground
      name: 355th TFS
      nickname: Falcons
      female_pilot_percentage: 0
      aircraft:
        - A-10C Thunderbolt II (Suite 7)
      size: 8
  # ---- BLUE: H-3 Southwest -- the 101st Airborne's strip ----
  17:
    # The 101st's Chinooks -- the G-Day air assault into FOB Cobra.
    - primary: Air Assault
      secondary: any
      name: 7-101st Aviation
      nickname: Eagle Lift
      female_pilot_percentage: 0
      aircraft:
        - CH-47F Block I
      size: 4
    # Task Force Normandy: the Apaches that fired the first shots of the war --
    # against the very EWR chain this campaign models.
    - primary: Escort
      secondary: any
      name: 1-101st Aviation
      nickname: Expect No Mercy
      female_pilot_percentage: 0
      aircraft:
        - AH-64A Apache
      size: 4
    # The Screaming Eagles' cavalry scouts: armed recon up the pipeline road.
    - primary: Armed Recon
      secondary: any
      name: 2-17th Cavalry
      nickname: Out Front
      female_pilot_percentage: 0
      aircraft:
        - OH-58D(R) Kiowa Warrior
      size: 4

