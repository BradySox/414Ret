# others tie the outer towns to the city. Endpoints are exact CP XY (closest-CP binding
# reads first/last waypoint only). All red<->red -- the one blue<->red front (Qayyarah
# West <-> Hammam al-Alil, the southern axis) is authored as a front-line group in the miz.
# TODO(in-app pass): re-trace intermediate waypoints on the real road network via
# tools/supply_route_geo.py (the 414th supply-line standard).
