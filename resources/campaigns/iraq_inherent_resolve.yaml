---
name: Iraq - Operation Inherent Resolve (COIN)
theater: Iraq
authors: 414th JFG
description: >-
  <p><strong>Nineveh, October 2016 &ndash; July 2017 &mdash; the fight to retake Mosul.</strong>
  The caliphate holds the city and a ring of towns across the Nineveh plain, and it does not
  fight like an army. Its cells <strong>regenerate</strong>: every insurgent-held stronghold
  quietly refills toward its original strength each turn, fed by hidden <strong>ammo caches</strong>
  and the ratline running west toward Tal Afar and Syria. Body count alone wins nothing here.</p>
  <p>Find the caches (recon them &mdash; then strike them) to collapse a stronghold's regeneration,
  interdict the trail, hunt the emirs, and grind the ring back with the Iraqi Security Forces up
  Highway 1 out of Balad &mdash; Tikrit, then Mosul &mdash; while air assaults peel the outer towns. And check your
  map before you roll in: <strong>Mosul itself sits inside a big no-strike positive-control box</strong>,
  because the caliphate fights from among the people &mdash; and in the last phase the
  <strong>Old City</strong> tightens to almost nothing. Every weapon released in the city prices
  collateral into the Coalition's mandate, kill by kill. The war is decided by the
  <strong>will meters</strong>: the mandate bleeds from airframes, lost bases, civilian casualties
  in the city, and plain time; the caliphate's resolve bleeds from its caches, its convoys, its
  emirs, and its strongholds &mdash; almost never from its dead fighters. Break their resolve
  before your mandate runs out.</p>
  <p>You fly with the <strong>CJTF-OIR coalition out of Balad</strong>: A-10s, Hornets and
  Vipers on the ramp, Marine Harriers, French Mirages and the Iraqi Air Force at Al-Taqaddum, the
  CENTAF heavies &mdash; Strike Eagles, the Bone, and the KC-135 bridge &mdash; alongside, and
  E-3s and Reapers overhead. The enemy has no air force, but answers with guns, shoulder-fired
  SAMs and the truck bomb at every stronghold &mdash; and <strong>a thin captured-SAM crust</strong>:
  an SA-6 over Mosul, SA-8/9/13 across the ring. Enough to make SEAD a real job; never enough to
  stop the war. Low is where the flak lives.</p>
  <p>The COIN layer &mdash; cache-throttled cell regeneration, the inverted will economy, and the
  three-phase Mosul arc &mdash; is the 414th's; sibling to Operation Enduring Resolve.</p>
recommended_player_faction: CJTF-OIR 2016
recommended_enemy_faction: Islamic State 2016
miz: iraq_inherent_resolve.miz
performance: 1
recommended_start_date: 2016-10-16
# A small real income (like Enduring Resolve): the C1 regen engine is the caliphate's real
# supply, and the ratline needs rear units to move. Kept low so procurement stays a trickle.
recommended_enemy_money: 250
recommended_enemy_income_multiplier: 0.25
version: "10.8"
settings:
  squadron_start_full: true
  # The COIN stack (feature docs: 414th-coin-insurgent-replenishment-notes.md):
  # cache-throttled cell regeneration + the ratline + FOB standoff fire + the
  # will economy that decides the war.
  coin_insurgency: true
  # The caliphate retakes cleared-but-ungarrisoned towns over a few announced,
  # counterable turns -- clearing a stronghold is not enough, you must HOLD it.
  coin_reinfiltration: true
  # Roadside IEDs and mobile VBIEDs on the ratline: hidden, recon-fogged strike targets
  # you must sweep -- an un-cleared device detonates and drains the mandate.
  coin_ied: true
  # High-value targets: a named emir surfaces near a stronghold for a limited strike
  # window. Kill him to blow the caliphate's momentum -- but he shelters in the city,
  # so a dirty shot pays in mandate too.
  coin_hvt: true
  # Dispersed cells: the insurgency in the open Nineveh countryside between strongholds.
  # Patrol for them or an un-hunted cell coalesces into its home stronghold and brings a
  # destroyed cache back online.
  coin_dispersed_cells: true
  # Insurgent indirect fire: blue airfields/FARPs/FOBs within mortar reach of a live
  # stronghold draw sporadic in-mission rocket/mortar harassment (never a player-spawn
  # field). Complements the front-based Vietnam toggle below (which covers Balad near
  # the Highway-1 front); this one keys off stronghold proximity and covers FOBs.
  coin_harassment: true
  # The ratline west toward Tal Afar / Syria (real, tracked convoys) and standoff
  # rocket/mortar fire on the forward field at Balad.
  vietnam_convoy_interdiction: true
  # §50 convoy escort/ambush -- the mirror of interdiction: your OWN supply convoys run
  # Highway 1 and concealed IS ambush teams dig in along the route (peak "ambush alley");
  # fly CAS/BAI escort or the column is ground down before it arrives. Preseed the
  # convoyambush PLUGIN ON too (the §36 lesson) so a saved default with it off doesn't
  # silently kill the feature.
  convoy_ambush: true
  plugins:
    convoyambush: true
  vietnam_airbase_harassment: true
  # The insurgent faction's ERO ZU-23 technicals are HDS Ultimate Compilation content --
  # they resolve only with the mod on (and drop silently without it, so a mod-less
  # install still plays).
  high_digit_sams: true

red_tempo:
  - from_turn: 6
    name: East Mosul
    trail_surge: 2.0

