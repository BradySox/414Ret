---
name: "Caucasus - Khe Sanh: Operation Niagara"
era: vietnam
theater: Caucasus
authors: 414th JFG (fork of NoGoodNews' 1968 Yankee Station)
description:
    <p><strong>Khe Sanh, summer 1968.</strong> The NVA have thrown two divisions around the
    Marine combat base, and the only way in is by air. You hold an encircled forward field
    while <strong>Operation Niagara</strong> — round-the-clock tac air, Arc Light, and aerial
    resupply — keeps the garrison alive, then break the ring with an <strong>Operation
    Pegasus</strong>-style relief from Da Nang.</p>
    <p>Khe Sanh (Kutaisi) is cut off on all sides by the NVA in the hills (Sukhumi),
    along Route 9 (Senaki), and at Lang Vei (Kobuleti) — where PT-76 and T-54 armor
    waits. Your relief pocket and the carriers on Yankee Station sit to the south at
    Da Nang (Batumi). The threat is wall-to-wall <strong>AAA</strong>, not MiGs — there
    are no MANPADS in 1968.</p>
    <p><strong>Pump up "Fortunate Son" and hold the line.</strong></p>
recommended_player_faction: USA 1970 Vietnam War
recommended_enemy_faction: NVA 1970
recommended_start_date: 1968-07-15  # summer: keeps the Caucasus map green (Jan = snow on Kutaisi). Year stays 1968 for weapon/era gating.
recommended_player_money: 3000
recommended_enemy_money: 1500
recommended_player_income_multiplier: 1.5
recommended_enemy_income_multiplier: 1.2
miz: khe_sanh_niagara.miz
performance: 2
version: "10.8"
advanced_iads: true

# Besieged Khe Sanh: a depleted Kutaisi garrison pulls the siege front in close. The front
# between two enemy CPs sits at strength_pct * route_length from the blue CP, so a weak blue
# Kutaisi (vs full-strength NVA) starts the fight near the perimeter instead of at the route
# midpoint. With the single Senaki->Kutaisi axis (see supply_routes), 0.25 holds the front
# ~7 km off the wire. Tune 0..1 -- lower = tighter siege.
control_point_strengths:
  Kutaisi: 0.25

settings:
  # Vietnam Ops period mechanics (era pre-seed). Inland siege -> no naval gunfire.
  vietnam_arc_light: true
  vietnam_flak_gauntlet: true
  restrict_weapons_by_date: true
  # Compressed theater: tuck AEW&C/tanker orbits close to the front. The 80/70 NM
  # defaults stand off ~150 km on a small map, sprawling support to the map edge;
  # 25/20 NM holds them ~75-90 km back. Per-campaign, so large maps are untouched.
  # Tunable live on the Air Doctrine settings page.
  aewc_threat_buffer_min_distance: 25
  tanker_threat_buffer_min_distance: 20
  vietnamwarvessels: true
  russianmilitaryassetspack: true
  a4_skyhawk: true
  ov10a_bronco: true
  f111c: false
  squadron_start_full: true
  oh_6: true
  oh_6_vietnamassetpack: true
  manpads: false
  night_day_missions: NightMissions.OnlyDay
  automate_runway_repair: true
  automate_front_line_reinforcements: true
  automate_aircraft_reinforcements: false
  desired_player_mission_duration: 60
  external_views_allowed: true
  max_frontline_width: 20
  invulnerable_player_pilots: true
  player_skill: "Excellent"
  enemy_skill: "Average"
  enemy_vehicle_skill: "Average"
  labels: "Dot Only"

squadrons:
  # --- Khe Sanh Combat Base (besieged garrison air) ---
  Kutaisi:
    - primary: CAS
      secondary: air-to-ground
      aircraft: [AH-1W SuperCobra]
      size: 2
    - primary: CAS
      secondary: air-to-ground
      aircraft: [OV-10A Bronco]
      size: 2
    - primary: CAS
      secondary: air-to-ground
      aircraft: [A-1H Skyraider]
      size: 2
    - primary: Air Assault
      secondary: any
      aircraft: [UH-1H Iroquois]
      size: 2

  # --- Da Nang (forward strip: Skyraiders, Crusaders, helos) ---
  Batumi:
    - primary: CAS
      secondary: air-to-ground
      aircraft: [A-1H Skyraider]
      size: 4
    - primary: BARCAP
      secondary: air-to-air
      aircraft: [F-8E Crusader]
      size: 4
    - primary: Air Assault
      secondary: any
      aircraft: [CH-53E]
      size: 2
    - primary: Air Assault
      secondary: any
      aircraft: [UH-1H Iroquois]
      size: 2

  # --- Tbilisi-Lochini (deep-east rear: fast jets + heavy fixed-wing) ---
  Tbilisi-Lochini:
    - primary: CAS
      secondary: air-to-ground
      aircraft: [F-100D Super Sabre]
      size: 6
    - primary: Strike
      secondary: air-to-ground
      aircraft: [F-4E-45MC Phantom II]
      size: 6
    - primary: TARPS
      # No secondary: unarmed photo bird, TARPS only (see its aircraft YAML). The
      # old "air-to-ground" alias is what put it on Armed Recon/Strike (G19).
      aircraft: [RF-101B Voodoo]
      size: 2
    - primary: Strike
      aircraft: [B-52H Stratofortress]
      size: 2
    - primary: AEW&C
      aircraft: [EC-121D Warning Star]
      size: 2
    - primary: Refueling
      aircraft: [KC-135 Stratotanker]
      size: 2
    - primary: Transport
      secondary: any
      aircraft: [C-130J-30]
      size: 2

  # --- Yankee Station carriers ---
  Naval-1:
    - primary: AEW&C
      aircraft: [E-2C Hawkeye]
      size: 2
    - primary: BARCAP
      secondary: air-to-air
      aircraft: [F-8E Crusader]
      size: 6
    - primary: Strike
      secondary: air-to-ground
      aircraft: [A-4E Skyhawk]
      size: 6
    - primary: Strike
      secondary: air-to-ground
      aircraft: [A-4E Skyhawk]
      size: 6
    - primary: TARPS
      # No secondary: unarmed photo bird, TARPS only (see its aircraft YAML). The
      # old "air-to-ground" alias is what put it on Armed Recon/Strike (G19).
      aircraft: [RA-5C Vigilante]
      size: 2

  # --- Yankee Station carrier #2 (Bon Homme Richard) ---
  Naval-2:
    - primary: Strike
      secondary: air-to-ground
      aircraft: [A-6E Intruder]
      size: 6
    - primary: CAS
      secondary: air-to-ground
      aircraft: [A-4E Skyhawk]
      size: 6

  # --- NVA: the hills (Sukhumi) ---
  Sukhumi-Babushara:
    - primary: CAS
      secondary: air-to-ground
      aircraft: [Mi-8MTV2 Hip]
      size: 4

  # --- NVA: Route 9 / token MiG presence (Senaki) ---
  Senaki-Kolkhi:
    - primary: BARCAP
      secondary: air-to-air
      aircraft: [MiG-17F Fresco-C]
      size: 8
    - primary: Transport
      secondary: any
      aircraft: [Mi-8MTV2 Hip]
      size: 4

# --- Ground supply routes / front graph. A front line forms on every blue<->red connection
# (the loader derives front geometry from these routes; no .miz M-113 groups). The siege is
# a SINGLE axis: Senaki -> Kutaisi is the only blue<->red link, so it is the one front. The
# other NVA bases (Sukhumi, Kobuleti) feed Senaki by red<->red road only -- they reinforce the
# spearhead instead of opening fronts of their own, so all the NVA pressure funnels down Route 9
# onto Kutaisi (Operation Pegasus axis). Every red leg is routed THROUGH the destructible
# bridges, so cutting a span chokes the whole siege. Retribution draws straight segments between
# waypoints (no pathfinding); first/last waypoint snaps to the origin/destination CP.
supply_routes:
  # Senaki -> Kutaisi  (THE front; "Thanh Hoa-Hanoi") -- crosses the Senaki (Rioni) bridge
  - waypoints:
      - [-284887, 683859]
      - [-283471, 653818]
      - [-281782, 647279]
  # Kobuleti -> Senaki  (NVA rear feeds the spearhead; "Don Hoi-Cambodia") -- crosses a Senaki bridge
  - waypoints:
      - [-281782, 647279]
      - [-286455, 641207]
      - [-317962, 635633]
  # Sukhumi -> Senaki  (NVA rear feeds the spearhead; "Da Nang-Senaki") -- coastal road,
  # crosses the Sukhumi + a Senaki bridge
  - waypoints:
      - [-220592, 564392]
      - [-221759, 567877]
      - [-228734, 588409]  # coastal bend -- straightens the corner this leg was cutting
      - [-234737, 590675]
      - [-245024, 609789]
      - [-255955, 630099]
      - [-286455, 641207]
      - [-281782, 647279]
  # Kutaisi -> Hill 881S  (forward blue FOB; friendly link, airlift-supplied with Kutaisi)
  - waypoints:
      - [-284887, 683859]
      - [-284042, 673895]
