      size: 6
    - primary: Strike
      secondary: air-to-ground
      aircraft: [F-4E-45MC Phantom II]
      size: 6
    - primary: TARPS
      secondary: air-to-ground
      aircraft: [RF-101B Voodoo]
      size: 2
    - primary: Strike
      aircraft: [B-52H Stratofortress]
      size: 2
    - primary: AEW&C
