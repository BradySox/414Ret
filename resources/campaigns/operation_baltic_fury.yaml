settings:
  squadron_start_full: true
  # --- Required mods: preseed the Mods page so the OOB airframes + the HDS S-400/S-300 hardware
  #     resolve at New Game. A missing mod REMOVES the unit from the faction, so any squadron
  #     authored on it is SILENTLY DROPPED -- keep the roster to units these six mods provide.
  fa_18efg: true                   # F/A-18E/F Super Hornet + EA-18G Growler (the carrier wing)
  fa18ef_tanker: true              # F/A-18E organic carrier tanker
  f22_raptor: true                 # F-22A Raptor (Nordholz)
  usamilitaryassetspack: true      # CurrentHill USA pack (blue ground / air defense)
  russianmilitaryassetspack: true  # CurrentHill Russia pack ([CH] Ka-52 / Tu-160M2 + red ground)
  high_digit_sams: true            # HDS Ultimate Compilation (S-400 / S-300 hardware)
  # 2027 era gate: hide post-era weapons + cockpit properties so the modern jets don't spawn
  # with beyond-era kit (both toggles; §24 split restrict_props off restrict_weapons).
  restrict_weapons_by_date: true
  restrict_props_by_date: true
  # §54 munitions scarcity: an airfield out of a scarce PGM/ARM/A2A store can't load it.
  # Pairs with war_economy below -- bomb a base's supply and its jets run dry.
  restrict_weapons_by_stock: true
  # Human-led counter-offensive: keep the blue auto-planner cautious so the 414th's sorties
  # (the SEAD/anti-ship push into the coastal belt) are the player's to fly.
  ownfor_autoplanner_aggressiveness: 10
  oca_target_autoplanner_min_aircraft_count: 40
  # §53 war economy + §54 air axis: a per-base materiel stockpile on top of money. Produced,
  # transported to the front, consumed; a starved / interdicted front recovers less and gains
  # less ground. §53 P3 fuel depots gate air readiness (bomb the fuel, ground the jets).
  war_economy: true
  fuel_air_readiness: true
  # §52 command-center decapitation: the advanced-IADS command network feeds red's PLANNING,
  # not just SAM autonomy -- as the player bombs the HQs, red's offensive targeting gets
  # sloppier. Reactive defense untouched. This laydown ships a real per-base C2 network to key on.
  c2_decapitation_effects: true
  # §49 mobile-missile relocation: a coastal SS-26 Iskander battery in the red rear (in the
  # .miz) shoots-and-scoots during the mission; with concealed_enemy_forces (default ON) it
  # shows only as a dashed "suspected activity" circle until a recon bird finds it.
  mobile_missile_relocation: true
  # §50 convoy escort/ambush: NATO supply convoys run the rear roads to the front; concealed
  # recon-team ambushes dig in along the route. Fly CAS/BAI escort or the column is ground down.
  convoy_ambush: true
  # Frontline artillery: fields within tube/rocket reach of the Lübeck neck draw sporadic
  # in-mission standoff harassment fire (never a player-spawn field; startup grace).
  artillery_base_harassment: true
  artillery_harassment_reach_km: 42
  # §51 enemy comms jamming: red's IADS comms masts step on the briefed NATO channels with
  # duty-cycled barrage noise until struck; the kneeboard carries the JAM BACKUP channel. The
  # default intel gate applies (red only jams once it takes a NATO comms plan off a captured
  # aircrew), so winning the Combat SAR race keeps the net clean.
  enemy_comms_jamming: true
  # §61 host red-interceptor scramble: F10 "HOST: Red Scramble" clones a red fighter flight at
  # any red field and vectors it onto the nearest blue fighters (MP events; gated to the host's
  # static "Flash" name tag). Free/untracked event content.
  host_red_scramble: true
  # §59 ground-AI sleep (MP performance): rear garrison + AAA sites idle their DCS controller
  # until an aircraft closes in (still visible/strikeable, kills record natively). A big win on
  # this dense IADS + TIC map -- the flown turn 1 showed ANTIFREEZE stutters under the load.
  perf_ground_ai_sleep: true
  perf_aaa_site_sleep: true
  plugins:
    # advanced_iads (top-level) is this laydown's centerpiece; mantisiads owns its whole runtime.
    mantisiads: true
    # §49 SCUD hunt, §50 ambush, §51 comms jam, §61 host scramble, §36/artillery harassment.
    mobilemissiles: true
    convoyambush: true
    commsjam: true
    redscramble: true
    vietnamops: true
    # §51's intel gate arms only off a captured aircrew; combat_sar_captures' only writer is the
    # combatsar plugin, so pin it on (also protects all over-water rescue + the POW->will feed).
    combatsar: true
    aisleep: true                    # §59 ground-AI sleep runtime (perf)
    # §61 host-menu gate: only DCS names containing "Flash" see the HOST: Red Scramble menu.
    redscramble.hostPlayers: Flash
    # §51 comms-jam feel: near-continuous pressure on the top few channels (~90% on-air, capped
    # to the 3 highest-priority nets; powerW 10000 so it reaches forward of the red C2 node).
    commsjam.burstSec: 120
    commsjam.intervalSec: 10
    commsjam.maxChannels: 3
    commsjam.powerW: 10000
# --- §75 custom victory: liberate Copenhagen = win; lose the Nordholz bridgehead = defeat.
