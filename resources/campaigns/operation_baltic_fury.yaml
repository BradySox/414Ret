---
name: Germany - Baltic Fury
theater: GermanyCW
authors: 414th JFG
recommended_player_faction: USA 2020
recommended_enemy_faction: Redfor (Russia) 2020
description: >
  <p>The Russian drive across the North German Plain has spent itself. In three weeks the
  spearhead overran Schleswig-Holstein, seized the Baltic coast, forced the Danish straits and
  put the red banner over Copenhagen -- and then it culminated, outrunning its fuel and ground
  down by the first NATO air. The line has stalled along the Lübeck neck. Now the initiative
  changes hands, and it comes from the sea.</p>
  <p>The United States Sixth Fleet is in the German Bight. A carrier strike group built around
  USS Harry S. Truman steams off the Frisian coast, its Super Hornet wing wing-to-wing with the
  414th Joint Fighter Group's Raptors and Strike Eagles surging into Nordholz. Ahead lies the
  hardest air-defense problem in Europe: a coastal anti-ship wall of Bastion-P and Bal missiles
  that keeps the fleet at arm's length, S-400 regiments over Rostock and Copenhagen, and the
  Baltic Fleet loose in the approaches.</p>
  <p>Break the coastal belt. Win the air battle over the Bight and the Baltic approaches. Roll
  the Red Army back up the coast -- Lübeck, Rostock, Peenemünde -- force the Danish straits, and
  liberate Copenhagen. He is reeling and out of position. Do not let him set his feet.</p>
  <p><em>A red storm over the Baltic Approaches -- the maritime flank of the war the Cold War
  never had.</em></p>
miz: operation_baltic_fury.miz
performance: 2
# Advanced (networked) IADS: red SAM bases carry co-located Command Center + Comms + Generator
# statics (in the .miz). MANTIS range mode wires each base's SAMs to its nearby comms (<15nm) /
# power (<35nm) / command center -> destroyable per-base C2 cells. The three strategic S-400
# hubs (Copenhagen / Rostock / Szczecin) are authored as multi-battalion regiments + a shared
# EWR (§60 doubling reverted for those, per the SAM-belt STANDARD); the forward MERAD screen
# (SA-11/17/BUK-M3/SA-6) keeps §60 doubling. See the campaign design note.
advanced_iads: true
recommended_start_date: 2027-07-17
# Blue counter-offensive tuning: NATO out-produces and out-buys the culminated salient.
recommended_player_money: 800
recommended_enemy_money: 400
recommended_player_income_multiplier: 1.3
recommended_enemy_income_multiplier: 0.7
version: "10.8"
