---
name: Marianas - Operation Velvet Thunder
era: vietnam
theater: MarianaIslands
authors: Starfire
recommended_player_faction: USA 1970
recommended_enemy_faction: Vietnam 1965
description:
  <p>Operation Velvet Thunder is a high-intensity training exercise designed to 
  prepare fresh troops for the challenges they will face in Vietnam. The dense 
  jungle and rugged terrain of the Mariana Islands will provide a realistic 
  backdrop, allowing our forces to hone essential skills in jungle warfare, 
  unconventional tactics, and counterinsurgency operations. There are multiple 
  checkpoints scattered across the area of operations that will have to be 
  captured by Air Assault.</p>
  <p><strong>Note:</strong> This campaign is intended to be played with the 
  A-4 Skyhawk, F-111C, OV-10A, C-130J, and Vietnam War Vessels mods active. 
  Airbase threat range is set to 20 for this campaign to optimise autoplanner.</p>
miz: operation_velvet_thunder.miz
performance: 1
recommended_start_date: 1970-11-29
version: "10.8"
settings:
  # Vietnam Ops period mechanics (era pre-seed). Jungle COIN -> no naval gunfire.
  # Convoy interdiction hunts the enemy supply trail; airbase harassment presses the
  # forward COIN strips; the Super Gaggle resupplies the cut-off checkpoints.
  vietnam_arc_light: true
  vietnam_flak_gauntlet: true
  vietnam_convoy_interdiction: true
  vietnam_airbase_harassment: true
  vietnam_super_gaggle: true
  restrict_weapons_by_date: true
  # Compressed theater: tuck AEW&C/tanker orbits close to the front. The 80/70 NM
  # defaults stand off ~150 km on a small map, sprawling support to the map edge;
  # 25/20 NM holds them ~75-90 km back. Per-campaign, so large maps are untouched.
  # Tunable live on the Air Doctrine settings page.
  aewc_threat_buffer_min_distance: 25
  tanker_threat_buffer_min_distance: 20
  airbase_threat_range: 20
  a4_skyhawk: true
  f111c: true
  ov10a_bronco: true
  vietnamwarvessels: true
  russianmilitaryassetspack: true
  oh_6: true
  oh_6_vietnamassetpack: true
  squadron_start_full: true
