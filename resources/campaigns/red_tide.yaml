settings:
  squadron_start_full: true
  # §1 QRA reserve: hold this many hot-alert interceptors per BARCAP-capable red
  # squadron. Preseeded here (not left to saved defaults) so Red Tide always plays its
  # Cold-War Soviet posture -- ~24 of red's 40 fighters stand alert, which is what makes
  # red fly a dense DEFENSIVE screen and (deliberately) no offensive packages. It also
  # feeds the QRA forward-defense layer so rear fields scramble to the Fulda/Haina front.
  # Standard default is 0; without this preseed a reset to standard would leave red both
  # quiet and passive.
  opfor_default_qra_reserve: 4
  # 1988 era gate: hide post-era weapons from the payload editor / generator so the
  # period jets don't spawn with modern kit. Preseeded because Red Tide is date-specific
  # and no other campaign setting covers it (standard default is off).
  restrict_weapons_by_date: true
  # §54 munitions scarcity: an airfield out of a scarce PGM/ARM/A2A store can't load it
  # (the loadout degrades to a stocked/dumb fallback). Pairs with war_economy below --
  # bomb a base's supply and its jets run dry. Default off and covered by no other
  # campaign setting, so it's preseeded here to survive a reset to standard defaults.
  restrict_weapons_by_stock: true
  # Human-led offensive: keep the blue auto-planner cautious so the AI fills fewer of
  # the ATO's offensive slots and the human's 414th sorties (F-16CM/F-A-18C/F-15E/
  # F-14B/A-10C) carry the push. Recommended NEW-GAME defaults; the player can
  # still change them in the wizard.
  #
  # Fraction of OPFOR threat-radius the blue auto-planner ignores. Default 20; lowered
  # so blue AI won't auto-throw strike/SEAD packages deep into red's IADS belt -- the
  # human flies those dangerous sorties instead. (Red/OPFOR aggressiveness untouched.)
  ownfor_autoplanner_aggressiveness: 10
  # Aircraft an airfield must hold before blue auto-plans an OCA strike on it. Default
  # 20; raised so airfield attack becomes a human-chosen objective, not AI busywork
  # (red squadrons are 4-8 jets, so most fields now fall below this threshold).
  oca_target_autoplanner_min_aircraft_count: 40
  # Frontline artillery: fields within tube/rocket reach (~20 NM) of the Fulda<->Haina
  # front -- the Fulda forward FARP, and red's Haina spearhead -- draw sporadic
  # in-mission standoff harassment fire (never a player-spawn field; startup grace).
  # The Gap is not a safe ramp.
  artillery_base_harassment: true
  # Reach bumped 35 -> 42 km: at turn 0 the Fulda<->Haina front sits ~39 km from BOTH
  # Fulda (the forward FARP) and Haina (red's spearhead), just past the 35 km default,
  # so neither field was shelled on a fresh game. 42 km puts both under fire from turn 1
  # (WP BM-27 Uragan MRLs reach ~35 km, so a ~42 km harassment envelope is period-honest).
  artillery_harassment_reach_km: 42
  # §50 convoy escort/ambush -- friendly NATO supply convoys run the rear roads up to the
  # Fulda front and concealed Spetsnaz/recon-team ambushes dig in along the route; fly
  # CAS/BAI escort or the column is ground down. The rear isn't a safe road, same as the
  # ramp isn't a safe ramp (artillery harassment above).
  convoy_ambush: true
  # §51 enemy comms jamming -- red's IADS comms masts / command bunkers (wired here by
  # advanced_iads range mode) step on the briefed NATO channels with duty-cycled
  # barrage noise until struck; the kneeboard carries the JAM BACKUP channel. The
  # default intel gate applies: red only jams once it takes a NATO comms plan off a
  # captured aircrew (lose the Combat SAR race / hold a POW), so SAR keeps the net
  # clean and a loss teaches the squadron to rotate compromised channels.
  enemy_comms_jamming: true
  # §57 air-droppable minefields -- the 414th Hornets carry the CBU-99 "Aerial Minefield"
  # loadout, so blue can mine the Soviet supply roads behind the Fulda front (a field left
  # undisturbed persists to next turn). auto_plan frags one mining sortie a turn at a red
  # convoy; fly it or let the AI take it. Needs the 'Air-droppable minefields' LUA plugin.
  air_droppable_minefields: true
  auto_plan_minefields: true
  # §52 command-center decapitation -- red's advanced-IADS command network (the 9 co-located
  # Command Center cells wired here by advanced_iads range mode) now feeds red's *planning*,
  # not just its SAM autonomy: as the player bombs those HQs, red's offensive target selection
  # gets sloppier (the §17 planner unpredictability is scaled up in proportion to the dead
  # fraction). "Break him before he can consolidate" made mechanical. Reactive defense is
  # untouched -- a decapitated red still defends. Default OFF; preseeded ON here because this
  # laydown is one of the very few with a real, per-base, destroyable command network to key on.
  c2_decapitation_effects: true
  # §53 war economy -- a per-base materiel supply stockpile on top of the money
  # economy. Red Tide is the testbed: it already ships a real economy laydown (3
  # factories + 3 ammo depots) plus a destroyable red logistics/C2 network, so
  # production and interdiction have something concrete to key on. Supply is produced,
  # transported to the front and consumed; a starved front recovers less / deploys
  # fewer / gains less ground (P2 bite); the SITREP shows front supply (P4a). See
  # game/fourteenth/war_economy.py. Its air axis, §54 munitions
  # (restrict_weapons_by_stock), is preseeded above.
  war_economy: true
  # §53 P3 -- fuel depots gate air readiness: bomb a base's fuel and it sorties fewer
  # jets next turn (down to a floor). No-op on bases without fuel depots. Symmetric.
  fuel_air_readiness: true
  # §55 red intent -- the enemy commander now plays with intent: each turn it reads the war
  # (ground balance, air strength, resolve, how last turn went) and adopts a posture
  # (consolidate / attrition / surge) that carries across turns, biasing which targets it
  # services, how erratic its picks are, whether it commits or defends, and how it husbands
  # ground reserves. Red-only; reactive defense is never touched. Preseeded ON because Red
  # Tide is a peer fight where red has real offensive agency -- and with §53 war economy also
  # ON here, the loop closes: bomb red's supply and a starved red DIGS IN (consolidates) even
  # when it's winning on the ground. Default OFF; see game/fourteenth/red_intent.py.
  red_intent: true
  # §49 mobile-missile relocation (the SCUD hunt) -- red fields two SS-1C Scud-B batteries in
  # the rear (near Wittstock and forward off Haina). With this on they shoot-and-scoot during
  # the mission, and with concealed_enemy_forces (default ON) they show only as a dashed
  # "suspected activity" circle until a recon bird finds them -- so the launcher is never quite
  # where the last photo froze it. Default ON; runtime lives in the mobilemissiles plugin
  # (preseeded below, same saved-default-off reasoning as the others).
  mobile_missile_relocation: true
  # The artillery harassment above runs inside the vietnamops PLUGIN's runtime (the
  # shared standoff-barrage loop). Preseed the plugin ON so a player whose saved
  # defaults disabled "Vietnam Ops (period mechanics)" -- reasonable on a
  # conventional-campaign squadron -- doesn't silently lose the feature. Layered
  # over their defaults like every other recommended setting; still uncheckable
  # in the wizard. Same reasoning preseeds the convoyambush plugin for §50,
  # the commsjam plugin for §51, and the mobilemissiles plugin for the §49 SCUD hunt.
  plugins:
    vietnamops: true
    convoyambush: true
    commsjam: true
    mobilemissiles: true
    minefields: true
    # §51 comms-jam feel: near-continuous pressure on a few high-priority channels
    # rather than short duty-cycled bursts scattered across many. 120 s of static with
    # a ~10 s gap (~90% on-air); maxChannels 3 caps it to the top-priority nets (the
    # human flights' intra-flight channels, then AWACS -- picked in that order by the
    # generator). powerW 10000 (100x the 100 W default -- the beacons in Moose run
    # 250-1000 W) so the interference is strong and reaches well forward of the red C2
    # node instead of only being audible right on top of it; DCS models the distance
    # falloff, so raise further (UI max 100000) if it's still weak at the front, lower
    # if it bleeds back to home plate. All tunable per-mission in the plugin options.
    commsjam.burstSec: 120
    commsjam.intervalSec: 10
    commsjam.maxChannels: 3
    commsjam.powerW: 10000
