description: <p>A merge of the two Scenic Route campaigns. <p><strong>Backstory:</strong> Iran has declared war on all US forces in the Gulf resulting in all local allies withdrawing their support for American troops. A carrier group, aided by USAF units stationed on the south bank must pacify Iran's coastal defences and push inland. Iran has assembled the full might of its air and ground divisions to defend their heartland.</p><p>Tuned for the <strong>[CH] Iran 2020</strong> faction (Shahed-136 drone barrages, IRGCN fast attack craft, Tor point defense) &mdash; install the CurrentHill Iran asset pack and enable it on the New Game Mods page for the full experience; without it the faction gracefully loses the CH units.</p>
