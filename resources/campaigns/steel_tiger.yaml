---
name: "Caucasus - Steel Tiger: Trail Interdiction"
era: vietnam
theater: Caucasus
authors: 414th JFG (interdiction reframing of NoGoodNews' 1968 Yankee Station)
description:
    <p><strong>The Laotian panhandle, 1968.</strong> Everything the NVA throws at the South
    moves down the <strong>Ho Chi Minh Trail</strong> — trucks, guns, and men, night after
    night, under triple-canopy jungle. <strong>Operation Steel Tiger</strong> is the air war
    to strangle it — round-the-clock armed reconnaissance, Arc Light on the choke points, and
    fast movers hunting the convoys before the cargo ever reaches the front.</p>
    <p>This is an <em>interdiction</em> campaign. The trail is a real, cuttable corridor —
    supply flows out of the <strong>Haiphong (Senaki)</strong> delta through <strong>FOB Mu
    Gia</strong>, <strong>Ban Karai</strong> and <strong>Ban Raving</strong> down to
    <strong>Tchepone</strong>, then over the last inland leg to the front at the DMZ — and
    every leg crosses a bridge. Find the column, kill it, and roll the next one back before
    it can be replaced. The threat is wall-to-wall <strong>AAA</strong> along the roads, not
    MiGs; the carriers on <strong>Yankee Station</strong> and the strip at <strong>Da Nang
    (Sochi-Adler)</strong> put the ordnance on target, and the B-52 cells out of Guam and
    U-Tapao flatten the staging areas.</p>
    <p><strong>Cut the trail. Pump up "Fortunate Son" and go to work.</strong></p>
    <p><strong>Note:</strong> shares the 1968 Yankee Station theater laydown; intended to be
    played with the A-4 Skyhawk, OV-10A Bronco, and Vietnam War Vessels mods active.</p>

recommended_player_faction: USA 1970 Vietnam War
recommended_enemy_faction: Vietnam 1970
recommended_start_date: 1968-04-03
recommended_player_money: 3000
recommended_enemy_money: 1200
# Interdiction economy: the point is to out-attrit the trail, so the player runs a healthy
# sustained income while the enemy's throughput is pinched (every killed convoy hurts).
recommended_player_income_multiplier: 2.0
recommended_enemy_income_multiplier: 1.1
miz: 1968_Yankee_Station.miz
performance: 2
version: "10.8"
advanced_iads: true

settings:
  # Vietnam Ops period mechanics (era pre-seed). Convoy interdiction is the CENTREPIECE —
  # the moving trail column is the campaign's signature target. Coastal (Yankee Station
  # laydown) -> naval gunfire on; Arc Light flattens the staging areas; flak is the trail's
  # teeth; airbase harassment presses the forward strips; the Super Gaggle resupplies the
  # cut-off FOB.
  vietnam_arc_light: true
  vietnam_flak_gauntlet: true
  vietnam_naval_gunfire: true
  vietnam_convoy_interdiction: true
  vietnam_airbase_harassment: true
  vietnam_super_gaggle: true
  vietnam_fac_marking: true
  vietnam_snake_and_nape: true
  vietnam_political_will: true
  vietnam_static_front: true
  restrict_weapons_by_date: true
  # Compressed theater: tuck AEW&C/tanker orbits close to the front. The 80/70 NM defaults
  # stand off ~150 km on a small map, sprawling support to the map edge; 25/20 NM holds them
  # ~75-90 km back. Per-campaign, so large maps are untouched.
  aewc_threat_buffer_min_distance: 25
  tanker_threat_buffer_min_distance: 20
  automate_runway_repair: true
  automate_front_line_reinforcements: true
  automate_aircraft_reinforcements: false
  no_enemy_navy: false
  desired_player_mission_duration: 60
  external_views_allowed: true
  max_frontline_width: 30

  # Mods to be used
  a4_skyhawk: true
  ov10a_bronco: true
  vietnamwarvessels: true
  russianmilitaryassetspack: true
  oh_6: true
  oh_6_vietnamassetpack: true
  squadron_start_full: true

  # Difficulty
  player_skill: "Excellent"
  enemy_skill: "Average"
  enemy_vehicle_skill: "Average"
  invulnerable_player_pilots: true
  manpads: false
  night_day_missions: NightMissions.OnlyDay
  labels: "Dot Only"

