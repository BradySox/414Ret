# Vietnam campaign layer W4: the authored ROE escalation arc (campaign phases P2,
# spec docs/dev/design/414th-vietnam-political-will-roe-notes.md section 3). Same
# theater truth as 1968 Yankee Station: the Hanoi ring sits over Kutaisi, Haiphong
# over Senaki, and the Tbilisi "PRC border" ring NEVER releases. For the trail war
# the early restraint matters less -- the panhandle FOBs are outside every ring.
phases:
  - key: rolling_thunder
    name: Rolling Thunder
    narrative: >-
      Gradual pressure under Washington's thumb: interdict the flow south, but the
      deep targets are off the list and the Hanoi-Haiphong heartland is sanctuary.
    emphasis: interdiction
    restricted_zones:
      - center: Kutaisi
        radius_nm: 15
        name: Hanoi sanctuary (RP VI-A)
      - center: Senaki-Kolkhi
        radius_nm: 8
        name: Haiphong sanctuary (RP VI-B)
      - center: Tbilisi-Lochini
        radius_nm: 15
        name: PRC border buffer
    locked_targets: [factory, power, oil, fuel, ammo, comms, ware, airfield]
    advance_when:
      blue_will_below: 75
  - key: bombing_halt
    red_tempo:
      trail_surge: 2.0
      resolve_regen: 1.5
    name: The Bombing Halt
    narrative: >-
      Washington halts the deep war to talk. The whole delta closes; the trail war
      and the front are all that is authorized.
    emphasis: interdiction
    min_turn: 8
    restricted_zones:
      - center: Kutaisi
        radius_nm: 25
        name: Hanoi-Haiphong sanctuary (expanded for the talks)
      - center: Tbilisi-Lochini
        radius_nm: 15
        name: PRC border buffer
    locked_targets: [factory, power, oil, fuel, ammo, comms, ware, airfield]
    advance_when:
      blue_will_below: 65
  - key: linebacker
    red_tempo:
      ground_offensive: 3
    name: Linebacker
    narrative: >-
      The talks stalled and the gloves come part-way off: Haiphong, the airfields and
      the deep target classes release; only the inner Hanoi ring still binds.
    emphasis: rollback
    min_turn: 11
    restricted_zones:
      - center: Kutaisi
        radius_nm: 6
        name: Hanoi sanctuary (inner ring)
      - center: Tbilisi-Lochini
        radius_nm: 15
        name: PRC border buffer
    advance_when:
      blue_will_below: 50
      enemy_iads_below: 0.4
  - key: linebacker_ii
    name: Linebacker II
    narrative: >-
      Maximum effort. Hanoi releases -- break the regime's resolve at the negotiating
      table by force. Only the Chinese border still binds; it never releases.
    emphasis: offensive
    min_turn: 16
    restricted_zones:
      - center: Tbilisi-Lochini
        radius_nm: 15
        name: PRC border buffer
