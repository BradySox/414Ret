# --- Political will economy (gated by vietnam_political_will) --------------------------------
# Ships are the decisive currency: a US warship sunk is a strategic blow to Washington's
# resolve (the USS Stark echo); sinking Iran's navy + its oil-platform gun forts breaks
# Tehran (as Praying Mantis historically did). Grind red resolve to zero -> Iran halts the
# attacks on shipping (negotiated WIN); Washington's resolve breaks first -> the escort
# mission is withdrawn (LOSS). Territory victory stays as a fallback.
will:
  blue:
    label: Washington's resolve
    exhaustion_title: Washington ends the escort mission
    exhaustion_body: >-
      The cost of keeping the Strait open has outrun the will to pay it. The escorts
      stand down and the Gulf is left to Tehran's guns -- whatever the map says.
  red:
    label: Tehran's regime resolve
    exhaustion_title: Tehran halts the attacks on shipping
    exhaustion_body: >-
      The navy is wreckage and the platforms burn. Tehran passes quiet word that the
      sea lanes will be left alone. The pressure at sea did what no army ashore had to.
  weights:
    blue_ship_lost: 10.0      # a US frigate/escort lost is front-page news
    red_ship_lost: 6.0        # sinking Iran's navy/boats is the load-bearing pressure
    blue_airframe_loss: 1.5
    red_airframe_loss: 0.5
    blue_roe_violation: 4.0   # a weapon released against neutral shipping in the lane
    red_ground_unit_lost: 0.4 # the oil-platform gun forts + coastal sites bleed Tehran
    blue_passive_regen: 0.5
    red_passive_regen: 0.5

# --- Authored phase arc (gated by campaign_phases): Tanker War -> Praying Mantis ------------
# Target-release escalation: early on you may only defend shipping (engage boats/coastal/
# SAM threats) -- Iran's oil platforms, C2 and power grid are OFF LIMITS until the mining
# authorizes retaliation. The neutral Strait shipping lane is a no-strike corridor in every
# phase (releasing weapons there risks a neutral tanker -> a will penalty).
# NOTE: the shipping-lane corridor coordinates are a first pass -- verify/refine by eye on the
# F10 map (or convert to a from_drawing zone drawn in the .miz) during the in-app pass.
phases:
  - key: tanker_war
    name: Tanker War
    narrative: >-
      Iranian boats, mines and coastal Silkworm batteries prey on Gulf shipping. Escort the
      tankers and hunt the raiders -- but the neutral sea lanes are watched by the world, and
      the war ashore is not yet yours to wage.
    emphasis: interdiction
    min_turn: 0
    restricted_zones: &shipping_lane
      - shape: corridor
        name: Strait of Hormuz shipping lane (neutral)
        width_nm: 16
        path:
          - {x: -100000, y: 85000}
          - {x: -10000, y: 30000}
          - {x: 45000, y: -20000}
          - {x: 25000, y: -160000}
    locked_targets: [oil, power, commandcenter, comms]
    objectives:
      - Keep the Strait of Hormuz open to neutral shipping
      - Hunt the missile boats and coastal Silkworm sites
    advance_when:
      blue_will_below: 80
  - key: samuel_b_roberts
    name: USS Samuel B. Roberts
    narrative: >-
      14 April 1988: the frigate USS Samuel B. Roberts strikes an Iranian mine and barely
      limps home. Washington authorizes a proportionate response -- the gloves come off
      against Iran's air defenses and command network.
    emphasis: rollback
    min_turn: 3
    restricted_zones: *shipping_lane
    locked_targets: [oil]
    objectives:
      - Roll back the coastal SAM belt and the IADS command net
    advance_when:
      red_resolve_below: 70
  - key: praying_mantis
    name: Operation Praying Mantis
    narrative: >-
      18 April 1988: retaliation in full. The Sassan and Sirri oil-platform gun forts, the
      missile boats, the frigates -- all are targets now. Break the Iranian navy and Tehran's
      nerve breaks with it.
    emphasis: offensive
    min_turn: 6
    restricted_zones: *shipping_lane
    objectives:
      - Destroy the oil-platform gun forts
      - Break the Iranian navy at sea
