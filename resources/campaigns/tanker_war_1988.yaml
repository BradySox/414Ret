      secondary: any
      aircraft:
        - UH-1H Iroquois
      size: 8
    - primary: CAS
      secondary: air-to-ground
      aircraft:
        - AH-1W SuperCobra
      size: 6
  # Al Minhad AFB (12) -- Navy/Marine land fighter detachment (land-based F-4E-45MC Phantoms,
