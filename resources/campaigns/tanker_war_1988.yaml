---
name: Persian Gulf - The Tanker War (1988)
theater: Persian Gulf
authors: 414th JFG (fork of Deadhead's Operation Noisy Cricket Redux, orig. Starfire)
recommended_player_faction: US Navy 1985
recommended_enemy_faction: Iran 1988
description: >
  <p><strong>The Strait of Hormuz, April 1988.</strong> Eight years of the Iran-Iraq War have
  spilled into the Gulf's shipping lanes. Iranian fast boats, mines and coastal Silkworm
  batteries prey on neutral tankers; on 14 April the frigate USS <em>Samuel B. Roberts</em>
  struck an Iranian mine. Washington's answer is <strong>Operation Praying Mantis</strong>.</p>
  <p>Flying from the carrier and the Gulf airfields, your task force must protect Gulf shipping
  and grind down Iranian naval and air power &mdash; the F-14 Tomcat squadrons at Kerman and
  Shiraz, the missile boats and frigates, the Silkworm sites and the oil-platform gun forts among
  the islands. Belligerent Exocet raiders (Mirage F1) hunt the sea lanes from Kish. This is a war
  decided at sea &mdash; <strong>ships, not territory</strong>.</p>
miz: tanker_war_1988.miz
performance: 1
recommended_start_date: 1988-04-18
recommended_player_money: 1000
recommended_enemy_money: 800
recommended_player_income_multiplier: 1.0
recommended_enemy_income_multiplier: 0.6
