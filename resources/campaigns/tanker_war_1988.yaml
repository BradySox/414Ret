  12:
    - primary: Escort
      secondary: air-to-air
      aircraft:
        - F-14A Tomcat (Block 135-GR Late)
      size: 12
    - primary: SEAD
      secondary: any
      aircraft:
        - F-4E-45MC Phantom II
      size: 6
    - primary: CAS
      secondary: air-to-ground
      aircraft:
        - F-4E-45MC Phantom II
      size: 10
  # Al Dhafra AFB (4) -- heavy/support
  4:
    - primary: Strike
      secondary: air-to-ground
      aircraft:
        - A-6E Intruder
      size: 10
    - primary: OCA/Runway
      secondary: any
      aircraft:
        - A-6E Intruder
      size: 8
    - primary: Refueling
      aircraft:
        - KC-130
      size: 2
  # Bandar Abbas Intl (2) -- Iranian main naval-air base
  2:
    - primary: Strike
      secondary: air-to-ground
      aircraft:
        - F-4E Phantom II
      size: 16
    - primary: TARCAP
      secondary: air-to-air
      aircraft:
        - F-5E Tiger II
      size: 14
  # Qeshm Island (13)
  13:
    - primary: CAS
      secondary: air-to-ground
      aircraft:
        - AH-1J SeaCobra
      size: 8
  # Abu Musa Island (1) -- forward IRGC island strip
  1:
    - primary: TARCAP
      secondary: air-to-air
      aircraft:
        - F-5E Tiger II
      size: 6
  # Kish Intl (24) -- Exocet raider base (Iraqi Mirage F1 flavor). The Mirage-F1EQ has no
  # ANTISHIP task in-engine, so it flies Strike (the "raider hitting the sea lanes/ports" is
  # briefing flavor); red's true anti-ship threat is the Silkworm coastal sites + boats.
  24:
    - primary: Strike
      secondary: air-to-ground
      aircraft:
        - Mirage-F1EQ
      size: 12
    - primary: TARCAP
      secondary: air-to-air
      aircraft:
        - F-4E Phantom II
      size: 12
  # Shiraz Intl (19)
  19:
    - primary: BARCAP
      secondary: air-to-air
      aircraft:
        - F-14A Tomcat (Block 135-GR Late)
      size: 12
  # Kerman (18) -- Iran's last combat-worthy Tomcats
  18:
