---
name: Persian Gulf - The Tanker War (1988)
theater: Persian Gulf
authors: 414th JFG (fork of Deadhead's Operation Noisy Cricket Redux, orig. Starfire)
recommended_player_faction: US Navy 1985
recommended_enemy_faction: Iran 1988
description: >
  <p><strong>The Strait of Hormuz, April 1988.</strong> Eight years of the Iran-Iraq War have
  spilled into the Gulf's shipping lanes. Iranian fast boats, mines and coastal Silkworm
  batteries prey on neutral tankers; on 14 April the frigate USS <em>Samuel B. Roberts</em>
  struck an Iranian mine. Washington's answer is <strong>Operation Praying Mantis</strong>.</p>
  <p>Flying from the carrier and the Gulf airfields, your task force must protect Gulf shipping
  and grind down Iranian naval and air power &mdash; the F-14 Tomcat squadrons at Kerman and
  Shiraz, the missile boats and frigates, the Silkworm sites and the oil-platform gun forts among
  the islands. Belligerent Exocet raiders (Mirage F1) hunt the sea lanes from Kish. This is a war
  decided at sea &mdash; <strong>ships, not territory</strong>.</p>
miz: tanker_war_1988.miz
performance: 1
recommended_start_date: 1988-04-18
recommended_player_money: 1000
recommended_enemy_money: 800
recommended_player_income_multiplier: 1.0
recommended_enemy_income_multiplier: 0.6
version: "10.8"
settings:
  uh_60l: false
  # The strike arm stays the free Heatblur A-6E Intruder (not the A-6A/A-7E mods).
  # The one mod: VAQ-135's EA-6B Prowler EW det (AI-only VSN mod) -- preseed on so
  # its SEAD squadron resolves (drops silently on a mod-less install).
  ea6b_prowler: true
  # Phase 3: the coastal Silkworm batteries shoot-and-scoot (the coastal-missile hunt),
  # alongside the SCUD sites. The shore/island batteries relocate; the platform gun-fort
  # AAA (added to the .miz) does not.
  mobile_missile_relocation: true
  coastal_missile_relocation: true
squadrons:
  # BLUFOR carrier air wing (all stock/free airframes: Tomcats, A-6E Intruders, Viking, Hawkeye)
  Blue CV-1:
    - primary: BARCAP
      secondary: air-to-air
      aircraft:
        - F-14A Tomcat (Block 135-GR Late)
      size: 12
    - primary: SEAD
      secondary: any
      aircraft:
        - A-6E Intruder
      size: 6
    # VAQ-135 "Black Ravens" -- CVW-11's EA-6B Prowler det (period-correct: Praying
    # Mantis flew off USS Enterprise/CVW-11). The dedicated HARM/jamming SEAD asset
    # alongside the A-6E. AI-only VSN mod (preseeded on); drops silently mod-less.
    - primary: SEAD
      secondary: [SEAD Escort]
      name: VAQ-135
      nickname: Black Ravens
      aircraft:
        - EA-6B Prowler
      size: 4
    - primary: Strike
      secondary: air-to-ground
      aircraft:
        - A-6E Intruder
      size: 8
    - primary: Anti-ship
      secondary: air-to-ground
      aircraft:
        - S-3B Viking
      size: 6
    - primary: AEW&C
      aircraft:
        - E-2C Hawkeye
      size: 3
    - primary: Refueling
      aircraft:
        - A-6E Tanker
      size: 4
  # BLUFOR amphibious group (Marine helos off the LHA)
