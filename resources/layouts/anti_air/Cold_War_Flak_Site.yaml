name: Cold War Flak Site
# Generic so every faction fills it with its own era/nation-appropriate AAA guns,
# rather than the old preset that hardcoded German WWII 8.8 cm Flak 18 for everyone.
generic: true
tasks:
  - AAA
groups:
  - AAA:
    - name: Cold War Flak Site Radar
      optional: true # Only spawned for groups that explicitly bring a radar (e.g. SON-9 Fire Can)
      fill: false # Do not auto-fill a SearchRadar into generic flak sites: keep them optically-guided guns
      unit_count:
        - 1
      unit_classes:
        - SearchRadar
    - name: Cold War Flak Site Flak
      unit_count:
        - 4
        - 6
      unit_classes:
        - AAA
    - name: Cold War Flak Site S-60
      unit_count:
        - 2
      unit_classes:
        - AAA
    - name: Cold War Flak Site AAA
      optional: true
      unit_count:
        - 2
      unit_classes:
        - AAA
    - name: Cold War Flak Site Logistics
      optional: true
      unit_count:
        - 1
        - 2
      unit_classes:
        - Logistics
