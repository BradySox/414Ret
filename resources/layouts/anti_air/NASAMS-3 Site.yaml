      optional: true
      fill: false # Do not fill with faction possible units
      unit_count:
        - 1
      unit_classes:
        - CommandPost
    - name: Launcher
      unit_count:
        - 4
      unit_types:
        - CH_NASAMS3_LN_AMRAAM_ER
    - name: Logistics
      optional: true
      unit_count:
        - 1
        - 2
      unit_classes:
        - Logistics
  - PD: # Point Defense as separate group
    - name: PD
      sub_task: PointDefense
      optional: true
      unit_count:
        - 2
      unit_types:
        - CH_NASAMS3_LN_AIM9X2
    - name: AAA
      sub_task: AAA
      optional: true
      unit_count:
        - 1
        - 2
      unit_classes:
        - AAA
