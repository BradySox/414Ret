carrier_capable: true
description:
    The Grumman A-6 Intruder was a twin-engine, carrier-based all-weather attack aircraft designed for the 
    US Navy and Marine Corps to deliver precision strike capability independent of daylight or clear visibility. 
    Introduced in the early 1960s, it was built around a two-crew cockpit and a powerful integrated navigation 
    and attack system that combined radar, inertial navigation, and terrain-following capability, allowing 
    low-level penetration and accurate weapons delivery at night and in poor weather. The Intruder carried a large 
    payload for a carrier aircraft, including guided and unguided bombs, anti-ship missiles, and other precision 
    stand-off weapons. It became one of the Navy's principal strike platforms from Vietnam through the 1991 Gulf War.
introduced: 1963
manufacturer: Grumman
origin: USA
price: 10
role: Carrier-based Attack
# The A-6 is a probe-and-drogue airframe both as a receiver and (Tanker variant) as a
# buddy tanker.
air_refuel_type: probe
variants:
  # The strike Intruder: attack tasks only, never auto-tasked as a tanker.
  A-6E Intruder:
    tasks:
      Anti-ship: 140
      BAI: 675
      CAS: 675
      DEAD: 300
      OCA/Aircraft: 480
      OCA/Runway: 415
      SEAD: 120
      SEAD Escort: 120
      Strike: 440
  # Buddy-tanker A-6 flown as a dedicated carrier tanker -- a separate "type" so it
  # is tasked only for refueling/recovery and never picks up the Intruder's strike
  # tasks. Mirrors the S-3B / S-3B Tanker split. Add the Intruder, the Tanker, both,
  # or neither to a squadron.
  A-6E Tanker:
    role: Carrier-based Tanker
    price: 20
    max_group_size: 1
    max_range: 1000
    patrol:
      # ~265 knots IAS, matching the S-3B carrier tanker.
      speed: 320
      altitude: 12000
    tanker_refuel_types:
      - probe
    tasks:
      Refueling: 0
      Recovery: 0