carrier_capable: true
description:
  The Lockheed S-3 Viking is a 4-crew, twin-engine turbofan-powered jet
  aircraft that was used by the U.S. Navy (USN) primarily for anti-submarine warfare.
  In the late 1990s, the S-3B's mission focus shifted to surface warfare and aerial
  refueling. The Viking also provided electronic warfare and surface surveillance
  capabilities to a carrier battle group. A carrier-based, subsonic, all-weather,
  long-range, multi-mission aircraft, it carried automated weapon systems and was
  capable of extended missions with in-flight refueling. Because of its characteristic
  sound, it was nicknamed the "War Hoover" after the vacuum cleaner brand. The S-3
  was phased out from front-line fleet service aboard aircraft carriers in January
  2009, with its missions taken over by aircraft like the P-3C Orion, P-8 Poseidon,
  Sikorsky SH-60 Seahawk and Boeing F/A-18E/F Super Hornet
introduced: 1984
manufacturer: Lockheed
origin: USA
price: 10
role: Carrier-based Attack
variants:
  S-3B Viking: {}
# Sea control only. The Viking is the carrier air wing's dedicated anti-ship
# shooter (Harpoon) and nothing else -- the land-attack tasks it used to carry
# (BAI/CAS/OCA/Strike/Armed Recon) all outranked the A-6E Intruder's own numbers
# (BAI 690 vs 675, Strike 480 vs 440, OCA/Aircraft 510 vs 480), so any air wing
# fielding both sent the Viking on the Intruder's missions. Strike work belongs to
# the A-6 (or the Hornets in the post-1997 factions); the Viking keeps the surface
# war, which is what the S-3B actually did once its mission shifted in the 1990s.
#
# No DEAD: the DCS S-3B carries no anti-radiation missile (its old "DEAD"
# preset was an AGM-84E SLAM -- a standoff land-attack weapon, not an ARM), so
# offering it for DEAD put Vikings on SAM sites they cannot suppress
# (2026-07-16 Scenic Route flown finding).
#
# Anti-ship 320 puts the Viking decisively ahead of every carrier fast jet
# (A-6E 140, F/A-18C 150) so the planner picks the dedicated platform, while
# staying below the true maritime-patrol bombers (P-3C/Tu-142 525).
tasks:
  Anti-ship: 320

# Air-to-air refueling method (receiver).
air_refuel_type: probe
