description:
  "The Panavia Tornado is a family of twin-engine, variable-sweep wing
  multirole combat aircraft, jointly developed and manufactured by Italy, the United
  Kingdom and West Germany. There are three primary Tornado variants: the Tornado
  IDS (interdictor/strike) fighter-bomber, the suppression of enemy air defences Tornado
  ECR (electronic combat/reconnaissance) and the Tornado ADV (air defence variant)
  interceptor aircraft."
introduced: 1996
manufacturer: Panavia
origin: UK/Italy/West Germany
price: 17
role: Strike Fighter
variants:
  Tornado GR4: {}
tasks:
  Anti-ship: 305
  DEAD: 410
  SEAD: 130
  SEAD Escort: 140
  Strike: 595

# Honest strike radius (the unset default is 150 NM, which grounded any Tornado
# based more than one map-corner from its target -- e.g. an off-map rear base).
# Hi-lo-hi with heavy stores runs ~390 NM; with tanks and a medium profile the
# type reaches well past that, so 600 keeps deep targets plannable.
max_range: 600

# Air-to-air refueling method (receiver).
air_refuel_type: probe
