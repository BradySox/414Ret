---
id: cloudy
wind:
  speed:
    weibull:
      # 414th: trimmed the upper-level scale_kts (was 2000m/8000m = 22/18). The generator
      # adds each layer's scale onto the layer below, so the old values put ~45 kt winds at
      # 8000m -- too strong for comfortable ops. See tests/test_wind_tuning.py.
      at_msl:
        shape: 1.6
        scale_kts: 6.5
      at_2000m:
        shape: 3.5
        scale_kts: 11
      at_8000m:
        shape: 6.4
        scale_kts: 10
