---
id: raining
wind:
  speed:
    weibull:
      # 414th: trimmed the upper-level scale_kts (was 2000m/8000m = 20/20). The generator
      # adds each layer's scale onto the layer below, so the old values put ~48 kt winds at
      # 8000m -- too strong for comfortable ops. See tests/test_wind_tuning.py.
      at_msl:
        shape: 2.6
        scale_kts: 8
      at_2000m:
        shape: 4.2
        scale_kts: 11
      at_8000m:
        shape: 6.4
        scale_kts: 11
